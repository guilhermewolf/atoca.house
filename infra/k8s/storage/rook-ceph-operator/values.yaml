csi:
  # CSI driver settings (cephFSKernelMountOptions, enableMetadata, enableLiveness)
  # moved out of this chart in Rook v1.20 -> see rook-ceph-csi-drivers/values.yaml.
  installCsiOperator: true
  serviceMonitor:
    enabled: true
image:
  repository: ghcr.io/rook/ceph
monitoring:
  enabled: true
resources:
  requests:
    memory: 128Mi # unchangable
    cpu: 100m # unchangable
  limits: {}
