---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-secret
  namespace: postiz
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postiz-secret
    template:
      data:
        JWT_SECRET: "{{ .JWT_SECRET }}"
        INSTAGRAM_APP_ID: "{{ .INSTAGRAM_APP_ID }}"
        INSTAGRAM_APP_SECRET: "{{ .INSTAGRAM_APP_SECRET }}"
        YOUTUBE_CLIENT_ID: "{{ .YOUTUBE_CLIENT_ID }}"
        YOUTUBE_CLIENT_SECRET: "{{ .YOUTUBE_CLIENT_SECRET }}"
        TWITCH_CLIENT_ID: "{{ .TWITCH_CLIENT_ID }}"
        TWITCH_CLIENT_SECRET: "{{ .TWITCH_CLIENT_SECRET }}"
        TIKTOK_CLIENT_ID: "{{ .TIKTOK_CLIENT_ID }}"
        TIKTOK_CLIENT_SECRET: "{{ .TIKTOK_CLIENT_SECRET }}"
        # OIDC (Authelia)
        POSTIZ_OAUTH_CLIENT_ID: "{{ .POSTIZ_OAUTH_CLIENT_ID }}"
        POSTIZ_OAUTH_CLIENT_SECRET: "{{ .POSTIZ_OAUTH_CLIENT_SECRET }}"
        # Cloudflare R2 (app-native S3 storage, not volsync backup)
        CLOUDFLARE_ACCOUNT_ID: "{{ .CLOUDFLARE_ACCOUNT_ID }}"
        CLOUDFLARE_ACCESS_KEY: "{{ .CLOUDFLARE_ACCESS_KEY }}"
        CLOUDFLARE_SECRET_ACCESS_KEY: "{{ .CLOUDFLARE_SECRET_ACCESS_KEY }}"
        CLOUDFLARE_BUCKET_URL: "{{ .CLOUDFLARE_BUCKET_URL }}"
        # SMTP (shared smtp-secrets item)
        EMAIL_HOST: "{{ .SMTP_ADDRESS }}"
        EMAIL_PORT: "{{ .SMTP_PORT }}"
        EMAIL_USER: "{{ .SMTP_USERNAME }}"
        EMAIL_PASS: "{{ .SMTP_PASSWORD }}"
        EMAIL_FROM_ADDRESS: "{{ .SMTP_FROM }}"
  dataFrom:
    - extract:
        key: postiz-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - extract:
        key: smtp-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-db-secret
  namespace: postiz
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: postiz-db-secret
    template:
      data:
        # Database Configuration. The Node/Mastra pg client verifies TLS against
        # the cert-manager CA mounted at /etc/ssl/postgres/ca.crt and trusted via
        # NODE_EXTRA_CA_CERTS (values.yaml) — no more NODE_TLS_REJECT_UNAUTHORIZED.
        DATABASE_URL: 'postgres://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}:{{ index . "port" | toString }}/{{ index . "dbname" }}?sslmode=require'
  dataFrom:
    - extract:
        key: postgres-pguser-postiz
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
