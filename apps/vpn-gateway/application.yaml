apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpn-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/guilhermewolf/atoca.house
    targetRevision: main
    path: apps/vpn-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: vpn-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
