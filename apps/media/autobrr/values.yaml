controllers:
  autobrr:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      autobrr:
        image:
          repository: ghcr.io/autobrr/autobrr
          tag: v1.76.0@sha256:f0f4d73fcd77700b1c98233562cd94a78b9bf685a7594a0aac4f8a9436b5044d
          pullPolicy: IfNotPresent
        env:
          AUTOBRR__HOST: 0.0.0.0
          AUTOBRR__PORT: &port 80
          AUTOBRR__METRICS_ENABLED: true
          AUTOBRR__METRICS_HOST: 0.0.0.0
          AUTOBRR__METRICS_PORT: &metricsPort 9094
          AUTOBRR__CHECK_FOR_UPDATES: false
          AUTOBRR__LOG_LEVEL: INFO
        envFrom:
          - secretRef:
              name: "autobrr-secret"
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          liveness:
            enabled: true
            spec:
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz/readiness
                port: *port
              periodSeconds: 10
              timeoutSeconds: 10
              failureThreshold: 10
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 10

defaultPodOptions:
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [{
        "name": "vpn",
        "namespace": "kube-system",
        "ips": ["192.168.90.15/24"],
        "mac": "2e:47:b9:6c:10:5d"
      }]
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

service:
  autobrr:
    controller: autobrr
    ports:
      http:
        port: *port
      metrics:
        port: *metricsPort

serviceMonitor:
  autobrr:
    endpoints:
      - port: metrics

route:
  autobrr:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - autobrr.atoca.house
    rules:
      - backendRefs:
          - name: autobrr
            port: 80
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  autobrr:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /config
  tmp:
    type: emptyDir
