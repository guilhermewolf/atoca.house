---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: audiobookshelf-restore
  namespace: audiobookshelf
spec:
  trigger:
    manual: restore-once
  restic:
    repository: audiobookshelf-r2-secret
    copyMethod: Direct
    destinationPVC: audiobookshelf
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
    moverSecurityContext:
      runAsUser: 99
      runAsGroup: 100
      fsGroup: 100
