---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparkyfitness-secrets
  namespace: sparkyfitness
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: sparkyfitness-secrets
    template:
      engineVersion: v2
      data:
        # Security Configuration
        SPARKY_FITNESS_API_ENCRYPTION_KEY: "{{ .SPARKY_FITNESS_API_ENCRYPTION_KEY }}"
        #JWT_SECRET: "{{ .JWT_SECRET }}"
        # Application Configuration
        SPARKY_FITNESS_FRONTEND_URL: "https://fitness.atoca.house"
        SPARKY_FITNESS_SERVER_HOST: "sparkyfitness-server.sparkfitness.svc.cluster.local"
        SPARKY_FITNESS_SERVER_PORT: "3010"
        SPARKY_FITNESS_LOG_LEVEL: "INFO"
        SPARKY_FITNESS_DISABLE_SIGNUP: "{{ .SPARKY_FITNESS_DISABLE_SIGNUP }}"
        SPARKY_FITNESS_ADMIN_EMAIL: "{{ .SPARKY_FITNESS_ADMIN_EMAIL }}"
        SPARKY_FITNESS_FORCE_EMAIL_LOGIN: "true"
        # Email Configuration
        SPARKY_FITNESS_EMAIL_HOST: "{{ .SMTP_ADDRESS }}"
        SPARKY_FITNESS_EMAIL_PORT: "{{ .SMTP_PORT }}"
        SPARKY_FITNESS_EMAIL_SECURE: "true"
        SPARKY_FITNESS_EMAIL_USER: "{{ .SMTP_USERNAME }}"
        SPARKY_FITNESS_EMAIL_PASS: "{{ .SMTP_PASSWORD }}"
        SPARKY_FITNESS_EMAIL_FROM: "{{ .SMTP_FROM }}"
        # Environment Configuration
        NODE_ENV: "production"
  dataFrom:
    - extract:
        key: sparkyfitness-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - extract:
        key: smtp-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparkyfitness-db-secrets
  namespace: sparkyfitness
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: sparkyfitness-db-secrets
    template:
      engineVersion: v2
      data:
        # Main database user (for migrations and initialization)
        SPARKY_FITNESS_DB_NAME: '{{ index . "main_dbname" }}'
        SPARKY_FITNESS_DB_USER: '{{ index . "main_user" }}'
        SPARKY_FITNESS_DB_PASSWORD: '{{ index . "main_password" }}'
        SPARKY_FITNESS_DB_HOST: '{{ index . "main_host" }}'
        SPARKY_FITNESS_DB_PORT: '{{ index . "main_port" }}'
        # Application database user (limited privileges for runtime)
        SPARKY_FITNESS_APP_DB_USER: '{{ index . "app_user" }}'
        SPARKY_FITNESS_APP_DB_PASSWORD: '{{ index . "app_password" }}'
  dataFrom:
    - extract:
        key: postgres-pguser-sparkyfitness
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
      rewrite:
        - regexp:
            source: "(.*)"
            target: "main_$1"
    - extract:
        key: postgres-pguser-sparkyfitness-app
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
      rewrite:
        - regexp:
            source: "(.*)"
            target: "app_$1"
