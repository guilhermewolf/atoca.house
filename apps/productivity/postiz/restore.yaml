---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: postiz-uploads-restore
  namespace: postiz
spec:
  trigger:
    manual: restore-once
  restic:
    repository: postiz-r2-secret
    copyMethod: Direct
    destinationPVC: postiz-uploads
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
