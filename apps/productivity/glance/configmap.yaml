---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glance
  annotations:
    reloader.stakater.com/match: "true"
data:
  glance.yml: |
    server:
      port: 80
      proxied: true

    theme:
      background-color: 240 21 15
      primary-color: 224 76 65
      positive-color: 142 71 45
      negative-color: 0 72 51

    pages:
      # -----------------------------------------------------------------------
      # HOME — default landing page, friendly for everyone
      # -----------------------------------------------------------------------
      - name: Home
        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: 24h
                timezones:
                  - timezone: Europe/Amsterdam
                    label: Home

              - type: calendar
                first-day-of-week: monday

              - type: weather
                location: Amsterdam
                units: metric
                hour-format: 24h

          - size: full
            widgets:
              - type: search
                search-engine: https://www.google.com/search?q={QUERY}
                new-tab: true
                autofocus: true

              - type: group
                widgets:
                  - type: rss
                    title: The Guardian
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://www.theguardian.com/world/rss
                        title: TheGuardian

                  - type: rss
                    title: Folha
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://feeds.folha.uol.com.br/emcimadahora/rss091.xml
                        title: Folha de SP

                  - type: rss
                    title: TheVerge
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://theverge.com/rss/index.xml
                        title: TheVerge

              - type: videos
                channels:
                  - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
                  - UCsXVk37bltHxD1rDPwtNM8Q # Kurzgesagt
                  -

          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Watch
                    color: 224 90 65
                    links:
                      - title: Jellyfin
                        url: https://jellyfin.atoca.house
                        icon: sh:jellyfin-light
                      - title: Request a Movie or Show
                        url: https://seerr.atoca.house
                        icon: sh:seerr-light

                  - title: Kitchen
                    color: 30 85 55
                    links:
                      - title: Recipes
                        url: https://mealie.atoca.house
                        icon: sh:mealie-light

                  - title: Get Things Done
                    color: 262 72 65
                    links:
                      - title: Tasks
                        url: https://vikunja.atoca.house
                        icon: sh:vikunja-light
                      - title: Notes
                        url: https://outline.atoca.house
                        icon: sh:outline-light
                      - title: Wiki
                        url: https://wiki.atoca.house
                        icon: sh:wiki-js-light

                  - title: Personal
                    color: 160 60 45
                    links:
                      - title: Fitness Tracker
                        url: https://fitness.atoca.house
                        icon:
                      - title: Library
                        url: https://booklore.atoca.house
                        icon: sh:booklore-light
                      - title: Bookmarks
                        url: https://shelfmark.atoca.house
                        icon: sh:shelfmark-light
                      - title: Home Assistant
                        url: https://hass.atoca.house
                        icon: sh:home-assistant-light
                      - title: AI Chat
                        url: https://chat.atoca.house
                        icon: sh:open-webui-light


      # -----------------------------------------------------------------------
      # ENTERTAINMENT — streaming + download automation
      # -----------------------------------------------------------------------
      - name: Entertainment
        columns:
          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Streaming
                    color: 224 90 65
                    links:
                      - title: Jellyfin
                        url: https://jellyfin.atoca.house
                        icon: sh:jellyfin-light
                      - title: Seerr (Requests)
                        url: https://seerr.atoca.house
                        icon: sh:jellyseerr-light
                      - title: Dispatcharr
                        url: https://dispatcharr.atoca.house
                        icon: sh:dispatcharr-light

                  - title: Downloads
                    color: 38 85 55
                    links:
                      - title: qBittorrent
                        url: https://qbittorrent.atoca.house
                        icon: sh:qbittorrent-light
                      - title: SABnzbd
                        url: https://sabnzbd.atoca.house
                        icon: sh:sabnzbd-light
                      - title: Autobrr
                        url: https://autobrr.atoca.house
                        icon: sh:autobrr-light
                      - title: SLSKD (Music)
                        url: https://slskd.atoca.house
                        icon: sh:slskd-light

                  - title: Reading & Music
                    color: 262 72 65
                    links:
                      - title: Shelfmark
                        url: https://shelfmark.atoca.house
                        icon: sh:shelfmark-light
                      - title: Soulsync
                        url: https://soulsync.atoca.house
                        icon: sh:soulsync

          - size: full
            widgets:
              - type: monitor
                title: Media Services
                cache: 2m
                sites:
                  - title: Jellyfin
                    url: https://jellyfin.atoca.house
                    icon: sh:jellyfin-light
                  - title: Seerr
                    url: https://seerr.atoca.house
                    icon: sh:seerr-light
                  - title: Radarr
                    url: https://radarr.atoca.house
                    icon: sh:radarr-light
                  - title: Sonarr
                    url: https://sonarr.atoca.house
                    icon: sh:sonarr-light
                  - title: Bazarr
                    url: https://bazarr.atoca.house
                    icon: sh:bazarr-light
                  - title: Prowlarr
                    url: https://prowlarr.atoca.house
                    icon: sh:prowlarr-light
                  - title: qBittorrent
                    url: https://qbittorrent.atoca.house
                    icon: sh:qbittorrent-light
                  - title: SABnzbd
                    url: https://sabnzbd.atoca.house
                    icon: sh:sabnzbd-light
                  - title: Autobrr
                    url: https://autobrr.atoca.house
                    icon: sh:autobrr-light
                  - title: SLSKD
                    url: https://slskd.atoca.house
                    icon: sh:slskd-light

              - type: bookmarks
                groups:
                  - title: Content Managers
                    links:
                      - title: Radarr (Movies)
                        url: https://radarr.atoca.house
                        icon: sh:radarr-light
                      - title: Sonarr (TV)
                        url: https://sonarr.atoca.house
                        icon: sh:sonarr-light
                      - title: Bazarr (Subtitles)
                        url: https://bazarr.atoca.house
                        icon: sh:bazarr-light
                      - title: Prowlarr (Indexers)
                        url: https://prowlarr.atoca.house
                        icon: sh:prowlarr-light
                      - title: 3D Printing — Spoolman
                        url: https://spoolman.atoca.house
                        icon: sh:spoolman-light

      # -----------------------------------------------------------------------
      # FEED — tech news, self-hosted community, release tracking
      # -----------------------------------------------------------------------
      - name: Feed
        head-widgets:
          - type: markets
            hide-header: true
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: EURUSD=X
                name: EUR/USD

        columns:
          - size: full
            widgets:
              - type: group
                widgets:
                  - type: hacker-news
                    sort-by: best
                    limit: 18
                    collapse-after: 8

                  - type: lobsters
                    sort-by: hot
                    limit: 18
                    collapse-after: 8

                  - type: reddit
                    subreddit: selfhosted
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: homelab
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: kubernetes
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: homeautomation
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

          - size: small
            widgets:
              - type: rss
                title: Self-Hosted News
                cache: 12h
                limit: 10
                collapse-after: 5
                feeds:
                  - url: https://selfh.st/rss/
                    title: selfh.st
                  - url: https://blog.cloudflare.com/rss
                    title: Cloudflare Blog

      # -----------------------------------------------------------------------
      # ADMIN — cluster management, monitoring, infra tools
      # -----------------------------------------------------------------------
      - name: Admin
        columns:
          - size: small
            widgets:
              - type: extension
                title: Cluster Nodes
                url: http://glance-k8s-extension:8080/extension/nodes
                allow-potentially-dangerous-html: true
                cache: 10s

          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: Observability
                    links:
                      - title: Grafana
                        url: https://grafana.atoca.house
                        icon: sh:grafana-light
                      - title: Prometheus
                        url: https://prometheus.atoca.house
                        icon: sh:prometheus-light
                      - title: AlertManager
                        url: https://alertmanager.atoca.house
                        icon: sh:grafana-alerts-dashboard-light
                      - title: Gatus
                        url: https://status.atoca.house
                        icon: sh:gatus-light
                      - title: VictoriaLogs
                        url: https://victorialogs.atoca.house
                        icon: sh:victoriametrics-light

                  - title: AI & Dev
                    links:
                      - title: Open WebUI
                        url: https://chat.atoca.house
                        icon: sh:open-webui-light
                      - title: OpenClaw
                        url: https://claw.atoca.house
                        icon: sh:openclaw-light
                      - title: SearXNG
                        url: https://search.atoca.house
                        icon: sh:searxng-light
                      - title: IRC — TheLounge
                        url: https://thelounge.atoca.house
                        icon: sh:the-lounge-light

                  - title: Productivity
                    links:
                      - title: Twenty CRM
                        url: https://twenty.atoca.house
                        icon: sh:twenty-light
                      - title: Vikunja
                        url: https://vikunja.atoca.house
                        icon: sh:vikunja-light
                      - title: Outline
                        url: https://outline.atoca.house
                        icon: sh:outline-light
                      - title: Wiki
                        url: https://wiki.atoca.house
                        icon: sh:wiki-js-light

              - type: repository
                repository: guilhermewolf/atoca.house
                pull-requests-limit: 10
                issues-limit: 3
                commits-limit: 3

          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Cluster
                    color: 224 90 65
                    links:
                      - title: ArgoCD
                        url: https://argocd.atoca.house
                        icon: sh:argo-cd-light
                      - title: Headlamp
                        url: https://headlamp.atoca.house
                        icon: sh:headlamp-light

                  - title: Identity & Auth
                    color: 262 72 65
                    links:
                      - title: Authelia
                        url: https://auth.atoca.house
                        icon: sh:authelia-light
                      - title: LLDAP
                        url: https://lldap.atoca.house
                        icon: sh:lldap-light

                  - title: Storage
                    color: 38 85 55
                    links:
                      - title: Rook-Ceph
                        url: https://rook.atoca.house
                        icon: sh:ceph-light
                      - title: pgAdmin
                        url: https://pgadmin.atoca.house
                        icon: sh:pgadmin-light

                  - title: Network
                    color: 160 60 45
                    links:
                      - title: Cloudflare
                        url: https://dash.cloudflare.com
                        icon: sh:cloudflare-light
                      - title: UniFi Toolkit
                        url: https://ui-toolkit.atoca.house
                        icon: sh:ubiquiti-unifi-light

                  - title: Files & Automation
                    links:
                      - title: FileBrowser
                        url: https://filebrowser.atoca.house
                        icon: sh:file-browser-light
                      - title: n8n
                        url: https://n8n.atoca.house
                        icon: sh:n8n-light
      # -----------------------------------------------------------------------
      # STAUS
      # -----------------------------------------------------------------------
      - name: Status
        columns:
          - size: full
            widgets:
              - $include: gatus.yml
  gatus.yml: |
    - type: custom-api
      title: Gatus
      cache: 5m
      options:
        base-url: https://status.atoca.house

        style: full
        duration: 24h
        groupFilter: ""
        compactMetric: uptime
        showFailingOnly: false
        showOnlyConfigured: true

        gatus: sh:gatus-light
        gatus-url: https://status.atoca.house

        grafana: sh:grafana-light
        grafana-url: https://grafana.atoca.house

        jellyfin: sh:jellyfin-light
        jellyfin-url: https://jellyfinf.atoca.house

        lldap: sh:lldap-light
        lldap-url: https://lldap.atoca.house

        sonarr: sh:sonarr-light
        sonarr-url: https://sonarr.atoca.house

        radarr: sh:radarr-light
        radarr-url: https://radarr.atoca.house

        prowlarr: sh:prowlarr-light
        prowlarr-url: https://prowlarr.atoca.house

        autobrr: sh:autobrr-light
        autobrr-url: https://autobrr.atoca.house

        authelia: sh:authelia-light
        authelia-url: https://auth.atoca.house

        n8n: sh:n8n-light
        n8n-url: https://n8n.atoca.house

        qbittorrent: sh:qbittorrent-light
        qbittorrent-url: https://qbittorrent.atoca.house

        rsshub: sh:rsshub

        slskd: sh:slskd-light
        slskd-url: https://slskd.atoca.house
      template: |
        {{/* Required config options */}}
        {{ $baseURL := .Options.StringOr "base-url" "" }}

        {{/* Optional config options */}}
        {{ $duration := .Options.StringOr "duration" "24h" }}
        {{ $style := .Options.StringOr "style" "full" }}
        {{ $groupFilter := .Options.StringOr "group" "" }}
        {{ $compactMetric := .Options.StringOr "compact-metric" "uptime" }}
        {{ $showFailingOnly := .Options.BoolOr "show-failing-only" false }}
        {{ $showOnlyConfigured := .Options.BoolOr "show-only-configured" false }}


        {{/* Error message template */}}
        {{ define "errorMsg" }}
          <div class="widget-error-header">
            <div class="color-negative size-h3">ERROR</div>
            <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
            </svg>
          </div>
          <p class="break-all">{{ . }}</p>
        {{ end }}

        {{/* Popover template */}}
        {{ define "popover" }}
          <div data-popover-html>
            <div style="margin: 5px;">
              <p class="margin-top-12" style="overflow-y: auto; text-align: justify; max-height: 20rem;">
                {{ range .Array "conditionResults" }}
                  {{ if (.Bool "success") }}
                    <p class="color-positive">{{ .String "condition" }}</p>
                  {{ else }}
                    <p class="color-negative">{{ .String "condition" }}</p>
                  {{ end }}
                {{ end }}
              </p>
            </div>
          </div>
        {{ end }}

        {{ $endpoints := newRequest (print $baseURL "/api/v1/endpoints/statuses")
            | getResponse }}

        {{ $options := .Options }}
        {{ $displayedItems := 0 }}
        {{ if eq $style "compact" }}
          <ul class="dynamic-columns list-gap-8 ">
          {{ range $i, $endpoint := $endpoints.JSON.Array "" }}
              {{ $name := $endpoint.String "name" }}
              {{ $key := $endpoint.String "key" }}
              {{ $group := $endpoint.String "group" }}
              {{ $linkUrlOption := $options.StringOr (concat $name "-url") "" }}
              {{ $linkUrl := $options.StringOr (concat $name "-url") (concat $baseURL "/endpoints/" $key) }}
              {{ $lastResult := index ( $endpoint.Array "results" ) (sub (len ($endpoint.Array "results")) 1) }}
              {{ $latestSuccess := $lastResult.Bool "success" }}

              {{ if and $groupFilter (not (eq $groupFilter $group)) }} {{ continue }} {{ end }}
              {{ if and $showFailingOnly $latestSuccess }} {{ continue }} {{ end }}
              {{ if and $showOnlyConfigured (eq $linkUrlOption "") }} {{ continue }} {{ end }}
              {{ $displayedItems = add $displayedItems 1 }}

              {{ $responseTime := "" }}
              {{ $uptime := "" }}
              {{ $uptimeValue := "" }}

              {{ if eq $compactMetric "uptime" }}
                {{ $uptime = newRequest (print $baseURL "/api/v1/endpoints/" $key "/uptimes/" $duration )
                    | getResponse }}
                {{ $uptimeValue = mul 100 ($uptime.JSON.Float "") }}
              {{ else }}
                {{ $responseTime = newRequest (print $baseURL "/api/v1/endpoints/" $key "/response-times/" $duration )
                    | getResponse }}
              {{ end }}

              <div class="flex items-center gap-12">
                <a class="size-title-dynamic color-highlight text-truncate block grow" href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">{{ $name }}</a>
                <a href="{{ $linkUrl | safeURL }}"  target="_blank" rel="noreferrer">
                  {{ if eq $compactMetric "uptime" }}
                    <div>{{ printf "%.1f" $uptimeValue }}%</div>
                  {{ else }}
                    <div>{{ $responseTime.JSON.Int "" }}ms</div>
                  {{ end }}
                </a>

                {{ if $latestSuccess }}
                  <div class="monitor-site-status-icon-compact">
                    <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                      <div data-popover-type="html" data-popover-position="above" data-popover-show-delay="500" style="align-content: center;">
                        {{ template "popover" $lastResult }}
                        <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" />
                        </svg>
                      </div>
                    </a>
                  </div>
                {{ else }}
                  <div class="monitor-site-status-icon-compact">
                    <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                      <div data-popover-type="html" data-popover-position="above" data-popover-show-delay="500" style="align-content: center;">
                        {{ template "popover" $lastResult }}
                        <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
                        </svg>
                      </div>
                    </a>
                  </div>
                {{ end }}

              </div>
            {{ end }}
          </ul>
        {{ else }}

          <ul class="dynamic-columns list-gap-20 list-with-separator">
          {{ range $i, $endpoint := $endpoints.JSON.Array "" }}
              {{ $name := $endpoint.String "name" }}
              {{ $key := $endpoint.String "key" }}
              {{ $group := $endpoint.String "group" }}
              {{ $icon := $options.StringOr $name "" }}
              {{ $linkUrlOption := $options.StringOr (concat $name "-url") "" }}
              {{ $linkUrl := $options.StringOr (concat $name "-url") (concat $baseURL "/endpoints/" $key) }}
              {{ $lastResult := index ( $endpoint.Array "results" ) (sub (len ($endpoint.Array "results")) 1) }}
              {{ $latestSuccess := $lastResult.Bool "success" }}

              {{ if and $groupFilter (not (eq $groupFilter $group)) }} {{ continue }} {{ end }}
              {{ if and $showFailingOnly $latestSuccess }} {{ continue }} {{ end }}
              {{ if and $showOnlyConfigured (or (eq $linkUrlOption "") (eq $icon "")) }} {{ continue }} {{ end }}
              {{ $displayedItems = add $displayedItems 1 }}

              {{ $uptime := newRequest (print $baseURL "/api/v1/endpoints/" $key "/uptimes/" $duration )
                  | getResponse }}
              {{ $responseTime := newRequest (print $baseURL "/api/v1/endpoints/" $key "/response-times/" $duration )
                  | getResponse }}

              {{ $uptimeValue := mul 100 ($uptime.JSON.Float "") }}

              {{ $iconUrl := "" }}
              {{ if $icon }}
                {{ $iconPrefix := findMatch "^(si|di|mdi|sh):" $icon }}
                {{ $iconBase := replaceMatches "^(si|di|mdi|sh):" "" $icon }}

                {{ $iconExt := findMatch "\\.[a-z]+$" $iconBase }}
                {{ $iconExt := replaceMatches "\\." "" $iconExt }}
                {{ $iconBase = replaceMatches "\\.[a-z]+$" "" $iconBase }}
                {{ if eq $iconExt "" }} {{ $iconExt = "svg" }} {{ end }}

                {{ if eq $iconPrefix "si:" }}
                  {{ $iconUrl = concat "https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/" $iconBase ".svg" }}
                {{ else if eq $iconPrefix "di:" }}
                  {{ $iconUrl = concat "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/" $iconExt "/" $iconBase "." $iconExt }}
                {{ else if eq $iconPrefix "mdi:" }}
                  {{ $iconUrl = concat "https://cdn.jsdelivr.net/npm/@mdi/svg@latest/svg/" $iconBase ".svg" }}
                {{ else if eq $iconPrefix "sh:" }}
                  {{ $iconUrl = concat "https://cdn.jsdelivr.net/gh/selfhst/icons/" $iconExt "/" $iconBase "." $iconExt }}
                {{ else }}
                  {{ $iconUrl = $icon }}
                {{ end }}
              {{ end }}

              <div class="monitor-site flex items-center gap-15">
                {{ if $iconUrl }}
                  <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                    <img class="monitor-site-icon" src="{{ $iconUrl | safeURL }}" alt="" loading="lazy">
                  </a>
                {{ end }}
                <div class="grow min-width-0">
                  <a class="size-h3 color-highlight text-truncate block" href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">{{ $name }}</a>

                  <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                    <ul class="list-horizontal-text">
                      <li class="{{ if not $latestSuccess }}color-negative{{ end }}">{{ printf "%.1f" $uptimeValue }}%</li>
                      <li>{{ $responseTime.JSON.Int "" }}ms</li>
                    </ul>
                  </a>
                </div>

                {{ if $latestSuccess }}
                  <div class="monitor-site-status-icon">
                    <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                      <div data-popover-type="html" data-popover-position="above" data-popover-show-delay="500" style="align-content: center;">
                        {{ template "popover" $lastResult }}
                        <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" />
                        </svg>
                      </div>
                    </a>
                  </div>
                {{ else }}
                  <div class="monitor-site-status-icon">
                    <a href="{{ $linkUrl | safeURL }}" target="_blank" rel="noreferrer">
                      <div data-popover-type="html" data-popover-position="above" data-popover-show-delay="500" style="align-content: center;">
                        {{ template "popover" $lastResult }}
                        <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
                        </svg>
                      </div>
                    </a>
                  </div>
                {{ end }}

              </div>
            {{ end }}
          </ul>
        {{ end }}

        {{ if eq $displayedItems 0 }}
