---
controllers:
  outline:
    labels:
      postgres: "true"
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: docker.io/outlinewiki/outline
          tag: 1.9.0@sha256:6744a369271ce3c5a37316e5bfc5311d8d4452eb5ee4ca9560c96c15fd718a39
        env:
          URL: "https://outline.atoca.house"
          ENABLE_UPDATES: false
          AWS_REGION: eu-east-1
          AWS_S3_ACL: private
          AWS_S3_FORCE_PATH_STYLE: "true"
          AWS_S3_UPLOAD_BUCKET_NAME: outline
          AWS_S3_UPLOAD_BUCKET_URL: "https://s3.atoca.house"
          FILE_STORAGE: s3
          FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
          FILE_STORAGE_IMPORT_MAX_SIZE: "26214400"
          OIDC_CLIENT_ID: outline
          OIDC_AUTH_URI: https://auth.atoca.house/api/oidc/authorization
          OIDC_TOKEN_URI: https://auth.atoca.house/api/oidc/token
          OIDC_USERINFO_URI: https://auth.atoca.house/api/oidc/userinfo
          OIDC_USERNAME_CLAIM: preferred_username
          OIDC_DISPLAY_NAME: Authelia
          OIDC_SCOPES: openid offline_access profile email
          REDIS_URL: "redis://dragonfly.dragonfly-cluster.svc.cluster.local:6379/7"
          NODE_EXTRA_CA_CERTS: /etc/ssl/postgres/ca.crt
          PORT: &port 8080
          WEB_CONCURRENCY: 10
        envFrom:
          - secretRef:
              name: outline-secret
          - secretRef:
              name: outline-db-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: [ "ALL" ] }
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
          limits:
            memory: 1000Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
service:
  app:
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - outline.atoca.house
    rules:
      - backendRefs:
          - name: outline
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /etc/ssl/postgres/ca.crt
        subPath: ca.crt
        readOnly: true
  tmpfs:
    type: emptyDir
    advancedMounts:
      outline:
        app:
          - path: /home/node
            subPath: node
          - path: /tmp
            subPath: tmp
