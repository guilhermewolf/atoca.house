---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: crowdsec-bouncer
  namespace: kube-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: atoca-house-external
    # Protect the internal Gateway too. LAN is not a trust boundary: a
    # compromised LAN host or SSRF-capable pod can otherwise reach 40+
    # HTTPRoutes (ArgoCD, Grafana, Prometheus, Rook, pgAdmin, etc.) without
    # any IP reputation or WAF inspection.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: atoca-house-internal
  extAuth:
    failOpen: true
    grpc:
      backendRefs:
        - group: ""
          kind: Service
          name: envoy-bouncer
          namespace: envoy-bouncer
          port: 8080
