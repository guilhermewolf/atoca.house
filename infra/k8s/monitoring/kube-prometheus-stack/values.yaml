crds:
  enabled: true

nameOverride: "monitoring"
cleanPrometheusOperatorObjectNames: true

alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.atoca.house
      parentRefs:
        - name: atoca-house-internal
          namespace: kube-system
  alertmanagerSpec:
    cleanPrometheusOperatorObjectNames: true
    alertmanagerConfiguration:
      name: alertmanager
    externalUrl: https://alertmanager.atoca.house
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          resources:
            requests:
              storage: 1Gi
  ingress:
    enabled: false

kubeEtcd:
  service:
    selector:
      component: kube-apiserver

prometheus:
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.atoca.house
      parentRefs:
        - name: atoca-house-internal
          namespace: kube-system
  prometheusSpec:
    externalUrl: https://prometheus.atoca.house
    resources:
      requests:
        cpu: 500m
        memory: 3000Mi
      limits:
        memory: 3000Mi
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          resources:
            requests:
              storage: 100Gi
    retention: 14d
    retentionSize: "90GB"
    walCompression: true
  ingress:
    enabled: false

prometheus-node-exporter:
  fullnameOverride: node-exporter
  prometheus:
    monitor:
      enabled: true
      relabelings:
    relabelings:
      - action: replace
        regex: (.*)
        replacement: $1
        sourceLabels:
          - __meta_kubernetes_pod_node_name
        targetLabel: kubernetes_node
      - action: replace
        regex: (.*)
        replacement: $1
        sourceLabels:
          - __meta_kubernetes_pod_node_name
        targetLabel: nodename
      - action: replace
        regex: (.*)
        replacement: $1.atoca.house:9100
        sourceLabels:
          - kubernetes_node
        targetLabel: instance

kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node

additionalPrometheusRulesMap:
  dockerhub-rules:
    groups:
      - name: dockerhub
        rules:
          - alert: DockerhubRateLimitRisk
            annotations:
              summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
            expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
            labels:
              severity: critical
  oom-rules:
    groups:
      - name: oom
        rules:
          - alert: OomKilled
            annotations:
              summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
            expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
            labels:
              severity: critical

  zfs-rules:
    groups:
      - name: zfs
        rules:
          - alert: ZfsUnexpectedPoolState
            annotations:
              summary: ZFS pool {{$labels.zpool}} on {{$labels.instance}} is in a unexpected state {{$labels.state}}
            expr: node_zfs_zpool_state{state!="online"} > 0
            labels:
              severity: critical
kubeProxy:
  enabled: false

grafana:
  enabled: false
  forceDeployDashboards: true
