---
fullnameOverride: victoria-logs
dashboards:
  enabled: true
  grafanaOperator:
    enabled: true
    spec:
      # Grafana CR is grafana/grafana, labelled grafana.internal/instance=grafana.
      # Chart default selector {dashboards: grafana} matches nothing.
      allowCrossNamespaceImport: true
      instanceSelector:
        matchLabels:
          grafana.internal/instance: grafana
server:
  persistentVolume:
    enabled: true
    storageClassName: ceph-block
    size: 40Gi
  retentionPeriod: 10d
  route:
    enabled: true
    hostnames:
      - victoria-logs.atoca.house
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: atoca-house-internal
        namespace: kube-system
    # extraRules:
    #   - filters:
    #       - type: RequestRedirect
    #         requestRedirect:
    #           path:
    #             type: ReplaceFullPath
    #             replaceFullPath: /select/vmui/
    #           statusCode: 302
    #     matches:
    #       - path:
    #           type: Exact
    #           value: /
  serviceMonitor:
    enabled: true
