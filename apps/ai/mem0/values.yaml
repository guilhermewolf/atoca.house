# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
controllers:
  mem0:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: docker.io/mem0/openmemory-mcp
          tag: latest@sha256:b665d382a94fdc18c7bb84a647d4bebdc98d9e7fc1146fc5e559ca7f5f7f9211
        env:
          HOME: /tmp
          # LLM — route through Ollama (OpenAI-compatible)
          OPENAI_API_KEY: ollama
          OPENAI_BASE_URL: http://ollama.ollama.svc.cluster.local:80/v1
          # SQLite database path
          DATABASE_URL: sqlite:////app/data/openmemory.db
          # Telemetry
          MEM0_TELEMETRY: "false"
        envFrom:
          - secretRef:
              name: mem0-secrets
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /docs
                port: &port 8765
              initialDelaySeconds: 30
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /docs
                port: *port
              initialDelaySeconds: 15
              periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }
service:
  app:
    controller: mem0
    ports:
      http:
        port: 8765
persistence:
  history:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ceph-block
    globalMounts:
      - path: /app/data
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
