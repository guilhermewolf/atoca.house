---
controllers:
  postiz:
    labels:
      postgres: "true"
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      # Our internal split-horizon DNS (UniFi local records) resolves
      # postiz.atoca.house to the private gateway IP for LAN clients.
      # Postiz's own token-refresh flow re-fetches its own already-hosted
      # avatar image on every refresh (vendor bug: gitroomhq/postiz-app
      # local.storage.ts always re-uploads integration.picture, even when
      # it's already a local URL). That fetch goes through an SSRF guard
      # that rejects the whole DNS answer if ANY record is a private IP -
      # so it throws before the refreshed OAuth token is persisted, and
      # tokens (e.g. YouTube) go stale until manually reconnected.
      # Pin the pod's own lookup of its hostname to a current public
      # Cloudflare A record so the SSRF guard only ever sees a public
      # address. Scoped to this pod only - does not affect DNS for any
      # other app or for LAN clients. IPv4, not AAAA: this network has no
      # IPv6 egress, so an IPv6 literal here is unreachable (ENETUNREACH).
      hostAliases:
        - ip: "172.67.202.239"
          hostnames:
            - postiz.atoca.house
    containers:
      app:
        image:
          repository: ghcr.io/gitroomhq/postiz-app
          tag: v2.21.10@sha256:1d5a5dc6b896747d1483c01dc2562165bd313ad601b32f6cabb7f7dd08a911a9
        env:
          # Combined image: Caddy on 5000 proxies / -> frontend(4200), /api -> backend(3000)
          MAIN_URL: "https://postiz.atoca.house"
          FRONTEND_URL: "https://postiz.atoca.house"
          NEXT_PUBLIC_BACKEND_URL: "https://postiz.atoca.house/api"
          BACKEND_INTERNAL_URL: "http://localhost:3000"
          IS_GENERAL: "true"
          RUN_CRON: "true"
          # Crunchy Postgres TLS is signed by the cert-manager postgres-ca,
          # mounted at /etc/ssl/postgres/ca.crt and added to Node's trust store
          # so the pg/Mastra client verifies it (no SELF_SIGNED_CERT_IN_CHAIN).
          NODE_EXTRA_CA_CERTS: /etc/ssl/postgres/ca.crt
          # Temporal workflow engine (required since Postiz v2.12.0)
          TEMPORAL_ADDRESS: "temporal-app.temporal.svc.cluster.local:7233"
          # Cloudflare R2 storage (app-native, replaces local PVC uploads)
          STORAGE_PROVIDER: "cloudflare"
          CLOUDFLARE_BUCKETNAME: "postiz"
          CLOUDFLARE_REGION: "auto"
          # SMTP email (host/port/user/pass/from via postiz-secret)
          EMAIL_PROVIDER: "nodemailer"
          EMAIL_SECURE: "true"
          EMAIL_FROM_NAME: "Postiz"
          # Redis (Dragonfly) - DB index 8 (5/6/7 already in use)
          REDIS_URL: "redis://dragonfly.dragonfly-cluster.svc.cluster.local:6379/8"
          # Flip to "true" once your first user is registered
          DISABLE_REGISTRATION: "true"
          API_LIMIT: "30"
          # OIDC login via Authelia (disables GitHub/Google login providers)
          POSTIZ_GENERIC_OAUTH: "true"
          NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: "Authelia"
          NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/master/png/authelia.png"
          POSTIZ_OAUTH_URL: "https://auth.atoca.house"
          POSTIZ_OAUTH_AUTH_URL: "https://auth.atoca.house/api/oidc/authorization"
          POSTIZ_OAUTH_TOKEN_URL: "https://auth.atoca.house/api/oidc/token"
          POSTIZ_OAUTH_USERINFO_URL: "https://auth.atoca.house/api/oidc/userinfo"
        envFrom:
          - secretRef:
              name: postiz-secret
          - secretRef:
              name: postiz-db-secret
        # Combined image runs nginx (master as root, workers drop to the `nginx`
        # user) + pm2; it needs the default Docker capability set (SETUID/SETGID/
        # CHOWN/DAC_OVERRIDE). Dropping ALL caps makes nginx fail to write
        # /var/lib/nginx. This image is not built for cap-hardening.
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            # Combined image runs nginx + 3 Node procs (backend/frontend/
            # orchestrator) and builds the orchestrator at startup -> memory spikes.
            memory: 4Gi

service:
  app:
    ports:
      http:
        port: 5000

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-external
        namespace: kube-system
    hostnames:
      - postiz.atoca.house
    rules:
      # Postiz's bundled nginx sends a CSP with a `sandbox` directive on
      # /uploads/* (hardening against GHSA-44wg-r34q-hvfx, a stored-XSS via
      # spoofed upload MIME types). Some browsers refuse to play video served
      # with that directive when the URL is opened directly (blank/non-loading
      # player), even though the byte stream itself is fine. Overwrite CSP for
      # this path only - keep media-src/default-src lockdown, drop `sandbox` -
      # and mark responses cacheable/embeddable, matching the fix other
      # self-hosted Postiz users apply at their reverse proxy.
      - backendRefs:
          - name: postiz
            port: 5000
        matches:
          - path:
              type: PathPrefix
              value: /uploads
        filters:
          - type: ResponseHeaderModifier
            responseHeaderModifier:
              set:
                - name: Content-Security-Policy
                  value: "default-src 'none'; img-src 'self'; media-src 'self'"
                - name: Cache-Control
                  value: "public, max-age=31536000, immutable"
                - name: Cross-Origin-Resource-Policy
                  value: cross-origin
      - backendRefs:
          - name: postiz
            port: 5000
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /etc/ssl/postgres/ca.crt
        subPath: ca.crt
        readOnly: true

  uploads:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 50Gi
    globalMounts:
      - path: /uploads

  config:
    type: emptyDir
    advancedMounts:
      postiz:
        app:
          - path: /config
  tmpfs:
    type: emptyDir
    advancedMounts:
      postiz:
        app:
          - path: /tmp
