controllers:
  multus:
    type: daemonset
    initContainers:
      cni-plugins:
        image:
          repository: ghcr.io/home-operations/cni-plugins
          tag: 1.9.1@sha256:56222d9cf686632f0951103a400adeeec8d982aaf8cbf4d21588da17a41dd228
    containers:
      multus:
        image:
          repository: ghcr.io/k8snetworkplumbingwg/multus-cni
          tag: v4.3.0@sha256:ec4e5dfe12b675e4dcbf4e9cd14892f7b4c8ac27aa0dc93cf2e9be0bdd7d764a
        args:
          - --cleanup-config-on-exit
          - --multus-cni-conf-dir=/tmp
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            add:
              - NET_ADMIN
            drop:
              - ALL
defaultPodOptions:
  hostNetwork: true
  priorityClassName: system-node-critical
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
rbac:
  roles:
    multus:
      type: ClusterRole
      rules:
        - apiGroups:
            - k8s.cni.cncf.io
          resources:
            - "*"
          verbs:
            - "*"
        - apiGroups:
            - ""
          resources:
            - pods
            - pods/status
          verbs:
            - get
            - update
        - apiGroups:
            - ""
            - events.k8s.io
          resources:
            - events
          verbs:
            - create
            - patch
            - update
  bindings:
    multus:
      type: ClusterRoleBinding
      roleRef:
        identifier: multus
      subjects:
        - identifier: multus
serviceAccount:
  multus: {}
persistence:
  etc-cni-net-d:
    type: hostPath
    hostPath: /etc/cni/net.d
    globalMounts:
      - path: /host/etc/cni/net.d
  opt-cni-bin:
    type: hostPath
    hostPath: /opt/cni/bin
    globalMounts:
      - path: /host/opt/cni/bin
  tmp:
    type: emptyDir
