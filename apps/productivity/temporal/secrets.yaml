---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-db-secret
  namespace: temporal
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: temporal-db-secret
    template:
      data:
        POSTGRES_SEEDS: '{{ index . "host" }}'
        DB_PORT: '{{ index . "port" | toString }}'
        POSTGRES_USER: '{{ index . "user" }}'
        POSTGRES_PWD: '{{ index . "password" }}'
  dataFrom:
    - extract:
        key: postgres-pguser-temporal
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
