global:
  logging:
    format: json
    level: info
  # Soft anti-affinity keeps replicas spread across nodes but doesn't block
  # scheduling during drains/rolling updates.
  affinity:
    podAntiAffinity: soft
  # Hostname-level spread across the 4 control-plane nodes.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

configs:
  cm:
    statusbadge.enabled: true
    url: &argocd-url https://argocd.atoca.house

    # Poll git every 60s (was 120s). Lower = faster UI updates on push,
    # since the internal gateway can't receive GitHub webhooks.
    timeout.reconciliation: 60s
    timeout.reconciliation.jitter: 30s

    repositories: |
      - url: https://github.com/guilhermewolf/atoca.house
        type: git

    resource.customizations: |
      apiextensions.k8s.io/CustomResourceDefinition:
        ignoreDifferences: |
          jsonPointers:
          - /spec/preserveUnknownFields
          - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration

      apps/Deployment:
        ignoreDifferences: |
          jsonPointers:
          - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
          - /spec/template/metadata/annotations/checksum~1cm
          - /spec/template/metadata/annotations/checksum~1cmd-params
          - /spec/template/metadata/annotations/checksum~1cmp-cm

    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

    kustomize.buildOptions: --enable-helm --load-restrictor LoadRestrictionsNone

  rbac:
    policy.csv: |
      g, ArgoCD Admins, role:admin
      g, ArgoCD Viewers, role:readonly

  params:
    server.insecure: "true" # IMPORTANT: Let the edge (Envoy Gateway) terminate TLS and run argocd-server in HTTP mode behind it.

  # Config Management Plugin for ArgoCD Vault Plugin
  cmp:
    create: true
    plugins:
      argocd-vault-plugin:
        allowConcurrency: true
        discover:
          find:
            command:
              - sh
              - "-c"
              - "find . -name '*.yaml' -o -name '*.yml' | xargs -I {} sh -c
                'grep -q \"^kind:\" \"{}\" && grep -q
                \"<[^>]*>\\|avp\\.kubernetes\\.io\" \"{}\" && echo \"{}\" ||
                true' 2>/dev/null"
        generate:
          command:
            - sh
          args:
            - "-c"
            - "find . -name '*.yaml' -o -name '*.yml' | xargs -I {} sh -c 'grep
              -q \"^kind:\" \"{}\" && cat \"{}\" && echo \"---\" || true'
              2>/dev/null | argocd-vault-plugin generate -"

crds:
  install: false
  keep: true

redisSecretInit:
  enabled: false

# Single redis is fine at this scale; just enable Prometheus metrics.
# (No PDB — with one replica a PDB would block node drains.)
redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dex:
  enabled: false

server:
  replicas: 2

  pdb:
    enabled: true
    minAvailable: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  httproute:
    enabled: true
    hostnames:
      - argocd.atoca.house
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: atoca-house-internal
        namespace: kube-system
    annotations: {}
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

repoServer:
  replicas: 2

  pdb:
    enabled: true
    minAvailable: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  env:
    # Cap manifest generation work in flight per repo-server pod.
    - name: ARGOCD_EXEC_TIMEOUT
      value: 5m
    - name: ARGOCD_GIT_ATTEMPTS_COUNT
      value: "3"

  # --parallelismlimit caps concurrent manifest generations per pod.
  # With 2 replicas that's up to 20 parallel generations cluster-wide.
  args:
    - --parallelismlimit=10

  # Increase probe timeouts to handle storage I/O latency
  livenessProbe:
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    timeoutSeconds: 10
    failureThreshold: 3

  initContainers:
    - name: download-tools
      image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
      command: [ sh, -c ]
      env:
        - name: AVP_VERSION
          value: "1.18.0"
      args:
        - >-
          wget -O /custom-tools/argocd-vault-plugin
          https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/v${AVP_VERSION}/argocd-vault-plugin_${AVP_VERSION}_linux_amd64
          && chmod +x /custom-tools/argocd-vault-plugin
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools

  # ArgoCD Vault Plugin sidecar container
  extraContainers:
    - name: avp
      command: [ /var/run/argocd/argocd-cmp-server ]
      image: quay.io/argoproj/argocd:v3.3.8@sha256:5d45dc6db21db32a0638ac9128462c6d9956a90fc81760146dada5a243ff7516
      env:
        - name: AVP_TYPE
          value: 1passwordconnect
        - name: OP_CONNECT_HOST
          value: http://onepassword-connect.one-password.svc.cluster.local
        - name: OP_CONNECT_TOKEN
          valueFrom:
            secretKeyRef:
              name: argocd-avp-token
              key: credential
              optional: true
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: cmp-tmp
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: argocd-vault-plugin.yaml
          name: argocd-cmp-cm
        - name: custom-tools
          subPath: argocd-vault-plugin
          mountPath: /usr/local/bin/argocd-vault-plugin

  # Volumes for CMP
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: cmp-tmp
      emptyDir: {}
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
  resources:
    requests:
      cpu: 600m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1000Mi

controller:
  replicas: 2
  # Enables graceful cluster rebalancing between controller replicas.
  dynamicClusterDistribution: true

  pdb:
    enabled: true
    minAvailable: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  env:
    # Must equal .replicas when dynamicClusterDistribution is on.
    - name: ARGOCD_CONTROLLER_REPLICAS
      value: "2"

  # Headroom for a large app count (100+ Applications).
  # Defaults are operation=10, status=20, kubectl-parallelism=20.
  args:
    - --operation-processors=25
    - --status-processors=50
    - --kubectl-parallelism-limit=20

  resources:
    requests:
      cpu: 500m
      memory: 1000Mi
    limits:
      cpu: 1500m
      memory: 2Gi

applicationSet:
  replicas: 2

  pdb:
    enabled: true
    minAvailable: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

notifications:
  enabled: true
  argocdUrl: *argocd-url

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  secret:
    create: false

  notifiers:
    service.webhook.discord: |
      url: $discord-webhook-url
      headers:
      - name: Content-Type
        value: application/json

  templates:
    template.app-health-degraded: |
      webhook:
        discord:
          method: POST
          body: |
            {
              "embeds": [
                {
                  "title": "⚠️ Application Degraded",
                  "description": "Application **{{.app.metadata.name}}** health has degraded",
                  "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                  "color": 15548997,
                  "fields": [
                    {
                      "name": "Health Status",
                      "value": "{{.app.status.health.status}}",
                      "inline": true
                    },
                    {
                      "name": "Sync Status",
                      "value": "{{.app.status.sync.status}}",
                      "inline": true
                    },
                    {
                      "name": "Repository",
                      "value": "{{.app.spec.source.repoURL}}",
                      "inline": false
                    }
                    {{range $index, $c := .app.status.conditions}}
                    ,{
                      "name": "{{$c.type}}",
                      "value": "{{$c.message}}",
                      "inline": false
                    }
                    {{end}}
                  ]
                }
              ]
            }

    template.app-out-of-sync: |
      webhook:
        discord:
          method: POST
          body: |
            {
              "embeds": [
                {
                  "title": "🔄 Application Out of Sync",
                  "description": "Application **{{.app.metadata.name}}** is out of sync",
                  "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                  "color": 16776960,
                  "fields": [
                    {
                      "name": "Sync Status",
                      "value": "{{.app.status.sync.status}}",
                      "inline": true
                    },
                    {
                      "name": "Health Status",
                      "value": "{{.app.status.health.status}}",
                      "inline": true
                    },
                    {
                      "name": "Repository",
                      "value": "{{.app.spec.source.repoURL}}",
                      "inline": false
                    },
                    {
                      "name": "Target Revision",
                      "value": "{{.app.spec.source.targetRevision}}",
                      "inline": true
                    }
                  ]
                }
              ]
            }

  triggers:
    trigger.on-app-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]

    trigger.on-app-out-of-sync: |
      - when: app.status.sync.status == 'OutOfSync'
        send: [app-out-of-sync]

  subscriptions:
    - recipients:
        - discord
      triggers:
        - on-app-health-degraded
        - on-app-out-of-sync
