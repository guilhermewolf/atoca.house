---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name postiz-secret
  namespace: postiz
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        # === Core
        JWT_SECRET: "{{ .POSTIZ_JWT_SECRET }}"

        # === Cloudflare R2 (optional, leave blank to use local storage)
        # CLOUDFLARE_ACCOUNT_ID: "{{ .POSTIZ_CLOUDFLARE_ACCOUNT_ID }}"
        # CLOUDFLARE_ACCESS_KEY: "{{ .POSTIZ_CLOUDFLARE_ACCESS_KEY }}"
        # CLOUDFLARE_SECRET_ACCESS_KEY: "{{ .POSTIZ_CLOUDFLARE_SECRET_ACCESS_KEY }}"
        # CLOUDFLARE_BUCKETNAME: "{{ .POSTIZ_CLOUDFLARE_BUCKETNAME }}"
        # CLOUDFLARE_BUCKET_URL: "{{ .POSTIZ_CLOUDFLARE_BUCKET_URL }}"
        # CLOUDFLARE_REGION: "auto"

        # === Social Media APIs (fill in as needed in 1Password)
        # X_API_KEY: "{{ .POSTIZ_X_API_KEY }}"
        # X_API_SECRET: "{{ .POSTIZ_X_API_SECRET }}"
        # LINKEDIN_CLIENT_ID: "{{ .POSTIZ_LINKEDIN_CLIENT_ID }}"
        # LINKEDIN_CLIENT_SECRET: "{{ .POSTIZ_LINKEDIN_CLIENT_SECRET }}"
        # REDDIT_CLIENT_ID: "{{ .POSTIZ_REDDIT_CLIENT_ID }}"
        # REDDIT_CLIENT_SECRET: "{{ .POSTIZ_REDDIT_CLIENT_SECRET }}"
        # GITHUB_CLIENT_ID: "{{ .POSTIZ_GITHUB_CLIENT_ID }}"
        # GITHUB_CLIENT_SECRET: "{{ .POSTIZ_GITHUB_CLIENT_SECRET }}"
        # THREADS_APP_ID: "{{ .POSTIZ_THREADS_APP_ID }}"
        # THREADS_APP_SECRET: "{{ .POSTIZ_THREADS_APP_SECRET }}"
        # FACEBOOK_APP_ID: "{{ .POSTIZ_FACEBOOK_APP_ID }}"
        # FACEBOOK_APP_SECRET: "{{ .POSTIZ_FACEBOOK_APP_SECRET }}"
        # YOUTUBE_CLIENT_ID: "{{ .POSTIZ_YOUTUBE_CLIENT_ID }}"
        # YOUTUBE_CLIENT_SECRET: "{{ .POSTIZ_YOUTUBE_CLIENT_SECRET }}"
        # TIKTOK_CLIENT_ID: "{{ .POSTIZ_TIKTOK_CLIENT_ID }}"
        # TIKTOK_CLIENT_SECRET: "{{ .POSTIZ_TIKTOK_CLIENT_SECRET }}"
        # PINTEREST_CLIENT_ID: "{{ .POSTIZ_PINTEREST_CLIENT_ID }}"
        # PINTEREST_CLIENT_SECRET: "{{ .POSTIZ_PINTEREST_CLIENT_SECRET }}"
        # DISCORD_CLIENT_ID: "{{ .POSTIZ_DISCORD_CLIENT_ID }}"
        # DISCORD_CLIENT_SECRET: "{{ .POSTIZ_DISCORD_CLIENT_SECRET }}"
        # DISCORD_BOT_TOKEN_ID: "{{ .POSTIZ_DISCORD_BOT_TOKEN_ID }}"
        # SLACK_ID: "{{ .POSTIZ_SLACK_ID }}"
        # SLACK_SECRET: "{{ .POSTIZ_SLACK_SECRET }}"
        # SLACK_SIGNING_SECRET: "{{ .POSTIZ_SLACK_SIGNING_SECRET }}"
        # MASTODON_URL: "https://mastodon.social"
        # MASTODON_CLIENT_ID: "{{ .POSTIZ_MASTODON_CLIENT_ID }}"
        # MASTODON_CLIENT_SECRET: "{{ .POSTIZ_MASTODON_CLIENT_SECRET }}"

        # === Misc
        # OPENAI_API_KEY: "{{ .POSTIZ_OPENAI_API_KEY }}"
  dataFrom:
    - extract:
        key: postiz-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-pguser-postiz
  namespace: postiz
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: postiz-db-secret
    template:
      data:
        # Database Configuration
        DATABASE_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}:{{ index . "port" | toString }}/{{ index . "dbname" }}?sslmode=prefer'
  dataFrom:
    - extract:
        key: postgres-pguser-postiz
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postiz-r2-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        RESTIC_REPOSITORY: "s3:{{ .RESTIC_REPOSITORY }}/postiz"
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: volsync-restic-r2
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
