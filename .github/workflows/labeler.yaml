name: "Labeler"

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened]
    branches: ["main"]

jobs:
  labeler:
    name: Labeler
    runs-on: ${{ github.event_name == 'pull_request_target' && 'ubuntu-latest' || 'arc-runners' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          configuration-path: .github/labeler.yaml