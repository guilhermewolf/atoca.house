---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  config.yaml: |
    # Hermes Agent configuration
    # Docs: https://hermes-agent.nousresearch.com/docs
    #
    # Model provider: routed through the in-cluster LiteLLM gateway (OpenAI-compatible
    # /v1 API). LiteLLM fans out to local Ollama, free-tier cloud (Groq/Cerebras/
    # OpenRouter/Mistral) and the ChatGPT subscription, with rate limits + fallbacks.
    # `default` MUST be a LiteLLM model_name (see litellm config.yaml model_list). The
    # agent needs function/tool-calling — pick a tool-capable model. Tool-capable
    # LiteLLM names: qwen3-14b, qwen2.5-coder-14b, gpt-oss-20b, qwen3-8b,
    # groq-llama-3.3-70b. (chatgpt/gpt-5.4 is Responses-only — avoid for the agent.)
    # api_key is the LiteLLM master key, injected from env via ${...} substitution.
    model:
      default: qwen3-14b
      provider: custom:litellm
    providers:
      litellm:
        base_url: http://litellm.litellm.svc.cluster.local:4000/v1
        api_key: ${LITELLM_MASTER_KEY}
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    # Memory: built-in MEMORY.md/USER.md always active; external provider is additive.
    # Holographic = local SQLite (FTS5 + trust scoring + contradiction detection),
    # zero extra infra, no LLM/embeddings/Qdrant, no GPU. DB lives on the /opt/data
    # PVC (covered by Volsync backup). See plugins.hermes-memory-store below.
    memory:
      provider: holographic
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    group_sessions_per_user: false
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    web:
      search_backend: searxng
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
      tool_use_enforcement: auto
    # Holographic memory store (local SQLite on the /opt/data PVC).
    plugins:
      hermes-memory-store:
        db_path: /opt/data/memory_store.db
        auto_extract: true
        default_trust: 0.5
    # No external MCP servers wired. (Self-hosted mem0/openmemory was dropped: its
    # native hermes provider is cloud-only, and the openmemory-mcp image can't pass
    # the api-key/768-dims our authed Qdrant + nomic embedder need.)
