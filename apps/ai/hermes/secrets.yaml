---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secret
  namespace: hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret
    template:
      data:
        API_SERVER_KEY: "{{ .API_SERVER_KEY }}"
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        DISCORD_ALLOWED_USERS: "{{ .DISCORD_ALLOWED_USERS }}"
        DISCORD_HOME_CHANNEL: "{{ .DISCORD_HOME_CHANNEL }}"
        DISCORD_HOME_CHANNEL_NAME: "{{ .DISCORD_HOME_CHANNEL_NAME }}"
        HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "{{ .HERMES_DASHBOARD_BASIC_AUTH_USERNAME }}"
        HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "{{ .HERMES_DASHBOARD_BASIC_AUTH_PASSWORD }}"
        # Fine-grained PAT scoped to guilhermewolf/atoca.house only
        # (Contents RW, Pull requests RW, Metadata R) — feeds the github
        # stdio MCP server in config.yaml.
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
        # n8n instance API key (n8n UI -> Settings -> n8n API) for the
        # built-in n8n MCP endpoint.
        N8N_API_KEY: "{{ .N8N_API_KEY }}"
  dataFrom:
    - extract:
        key: hermes-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - extract:
        key: litellm-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
