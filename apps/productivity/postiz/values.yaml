---
controllers:
  postiz:
    labels:
      postgres: "true"
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          # renovate: datasource=docker depName=ghcr.io/gitroomhq/postiz-app
          repository: ghcr.io/gitroomhq/postiz-app
          tag: v2.21.8
        env:
          # === Required Settings
          MAIN_URL: "https://postiz.atoca.house"
          FRONTEND_URL: "https://postiz.atoca.house"
          NEXT_PUBLIC_BACKEND_URL: "https://postiz.atoca.house/api"
          BACKEND_INTERNAL_URL: "http://localhost:3000"
          REDIS_URL: "redis://dragonfly.dragonfly-cluster.svc.cluster.local:6379/8"
          TEMPORAL_ADDRESS: "postiz-temporal:7233"
          IS_GENERAL: "true"
          DISABLE_REGISTRATION: "true"
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

          # === Storage Settings
          STORAGE_PROVIDER: "local"
          UPLOAD_DIRECTORY: "/uploads"
          NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

          # === Misc Settings
          API_LIMIT: 30
          FEE_AMOUNT: "0.05"
          NX_ADD_PLUGINS: "false"
        envFrom:
          - secretRef:
              name: postiz-secret
          - secretRef:
              name: postiz-db-secret
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi

  temporal:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      wait-for-postgres:
        image:
          repository: postgres
          tag: "16-alpine"
        command:
          - sh
          - -c
          - >-
            until pg_isready -h postiz-temporal-postgres -p 5432 -U temporal; do
              echo "Waiting for postiz-temporal-postgres..."; sleep 2;
            done
      wait-for-elasticsearch:
        image:
          repository: curlimages/curl
          tag: "8.11.1"
        command:
          - sh
          - -c
          - >-
            until curl -sf http://postiz-temporal-elasticsearch:9200/_cluster/health; do
              echo "Waiting for postiz-temporal-elasticsearch..."; sleep 2;
            done
    containers:
      temporal:
        image:
          # renovate: datasource=docker depName=temporalio/auto-setup
          repository: temporalio/auto-setup
          tag: 1.28.1
        env:
          DB: "postgres12"
          DB_PORT: "5432"
          POSTGRES_USER: "temporal"
          POSTGRES_PWD: "temporal"
          POSTGRES_SEEDS: "postiz-temporal-postgres"
          DYNAMIC_CONFIG_FILE_PATH: "config/dynamicconfig/development-sql.yaml"
          ENABLE_ES: "true"
          ES_SEEDS: "postiz-temporal-elasticsearch"
          ES_VERSION: "v7"
          TEMPORAL_NAMESPACE: "default"
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi

  temporal-elasticsearch:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      fix-data-perms:
        image:
          repository: busybox
          tag: "1.36"
        command:
          - sh
          - -c
          - "chown -R 1000:1000 /usr/share/elasticsearch/data && chmod -R u+rwX /usr/share/elasticsearch/data"
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: true
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
    containers:
      elasticsearch:
        image:
          # renovate: datasource=docker depName=elasticsearch
          repository: elasticsearch
          tag: 9.4.1
        env:
          cluster.routing.allocation.disk.threshold_enabled: "true"
          cluster.routing.allocation.disk.watermark.low: "512mb"
          cluster.routing.allocation.disk.watermark.high: "256mb"
          cluster.routing.allocation.disk.watermark.flood_stage: "128mb"
          discovery.type: "single-node"
          ES_JAVA_OPTS: "-Xms256m -Xmx256m"
          xpack.security.enabled: "false"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi

  temporal-postgres:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
    containers:
      postgres:
        image:
          # renovate: datasource=docker depName=postgres
          repository: postgres
          tag: "16-alpine"
        env:
          POSTGRES_USER: "temporal"
          POSTGRES_PASSWORD: "temporal"
          PGDATA: "/var/lib/postgresql/data/pgdata"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["pg_isready", "-U", "temporal"]
              initialDelaySeconds: 20
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["pg_isready", "-U", "temporal"]
              initialDelaySeconds: 5
              periodSeconds: 5
        securityContext:
          runAsUser: 999
          runAsGroup: 999
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  postiz:
    controller: postiz
    ports:
      http:
        port: 5000

  temporal:
    controller: temporal
    ports:
      grpc:
        port: 7233

  temporal-postgres:
    controller: temporal-postgres
    ports:
      postgres:
        port: 5432

  temporal-elasticsearch:
    controller: temporal-elasticsearch
    ports:
      http:
        port: 9200

route:
  postiz:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - postiz.atoca.house
    rules:
      - backendRefs:
          - name: postiz
            port: 5000
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 2Gi
    advancedMounts:
      postiz:
        app:
          - path: /config

  uploads:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 20Gi
    advancedMounts:
      postiz:
        app:
          - path: /uploads

  temporal-postgres-data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      temporal-postgres:
        postgres:
          - path: /var/lib/postgresql/data

  temporal-elasticsearch-data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      temporal-elasticsearch:
        fix-data-perms:
          - path: /usr/share/elasticsearch/data
        elasticsearch:
          - path: /usr/share/elasticsearch/data

  temporal-dynamicconfig:
    type: configMap
    name: postiz-temporal-dynamicconfig
    advancedMounts:
      temporal:
        temporal:
          - path: /etc/temporal/config/dynamicconfig
