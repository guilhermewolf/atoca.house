controllers:
  authelia:
    replicas: 2
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      authelia:
        image:
          repository: ghcr.io/authelia/authelia
          tag: 4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
        env:
          AUTHELIA_SERVER_ADDRESS: tcp://0.0.0.0:80
          AUTHELIA_SERVER_DISABLE_HEALTHCHECK: "false"
          AUTHELIA_TELEMETRY_METRICS_ADDRESS: tcp://0.0.0.0:8080
          AUTHELIA_TELEMETRY_METRICS_ENABLED: "true"
          AUTHELIA_THEME: auto
          AUTHELIA_LOG_LEVEL: info
          # Trust the cert-manager postgres-ca for verified Postgres TLS
          # (storage.postgres.tls.skip_verify=false). Augments the system trust.
          AUTHELIA_CERTIFICATES_DIRECTORY: /certificates
          X_AUTHELIA_CONFIG: /config/configuration.yaml
          X_AUTHELIA_CONFIG_FILTERS: template
        envFrom:
          - secretRef:
              name: authelia-db-secret
          - secretRef:
              name: authelia-secret
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: &port 80
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
          startup:
            enabled: false
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
    pod:
      annotations:
        k8s.ksgate.org/postgres-ready: |
          {
            "apiVersion": "postgres-operator.crunchydata.com/v1beta1",
            "kind": "PostgresCluster",
            "name": "postgres",
            "namespace": "crunchy-postgres-cluster",
            "expression": "has(resource.status.instances) && resource.status.instances.exists(i, i.readyReplicas >= 1)"
          }
        k8s.ksgate.org/postgres-service: |
          {
            "apiVersion": "v1",
            "kind": "Service",
            "name": "postgres-pgbouncer",
            "namespace": "crunchy-postgres-cluster"
          }

        k8s.ksgate.org/lldap-deployment: |
          {
            "apiVersion": "apps/v1",
            "kind": "Deployment",
            "name": "lldap",
            "namespace": "lldap",
            "expression": "has(resource.status.conditions) && resource.status.conditions.exists(c, c.type == 'Available' && c.status == 'True')"
          }
      schedulingGates:
        - name: k8s.ksgate.org/postgres-ready
        - name: k8s.ksgate.org/postgres-service
        - name: k8s.ksgate.org/lldap-deployment
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: authelia

service:
  authelia:
    controller: authelia
    ipFamilyPolicy: PreferDualStack
    ports:
      http:
        port: *port
        primary: true
      metrics:
        port: 8080
serviceMonitor:
  authelia:
    serviceName: authelia
    endpoints:
      - port: metrics

route:
  authelia:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-external
        namespace: kube-system
    annotations:
      gatus.home-operations.com/endpoint: |-
        conditions: ["[STATUS] == 200"]
    hostnames:
      - auth.atoca.house
    rules:
      - backendRefs:
          - name: authelia
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  config:
    type: configMap
    name: authelia-configmap
    globalMounts:
      - path: /config/configuration.yaml
        subPath: configuration.yaml
        readOnly: true
  secret-files:
    enabled: true
    type: secret
    name: authelia-secret
    globalMounts:
      - path: /config/secret
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /certificates/postgres-ca.crt
        subPath: ca.crt
        readOnly: true
