---
controllers:
  kopia:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.23.1@sha256:e914ae4b91d39c8aef1875a04bbd7824f1405463345fb37b8cd7a7c3cbe6adda
        env:
          KOPIA_WEB_ENABLED: true
          KOPIA_WEB_PORT: &port 80
        envFrom:
          - secretRef:
              name: kopia-secret
        args:
          - --refresh-interval=5m
          - --without-password
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 1Gi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 99
    runAsGroup: 100
    fsGroup: 100
    fsGroupChangePolicy: OnRootMismatch

service:
  app:
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - kopia.atoca.house
    rules:
      - backendRefs:
          - name: kopia
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

configMaps:
  config:
    data:
      repository.config: |-
        {
          "storage": {
            "type": "filesystem",
            "config": {
              "path": "/repository"
            }
          },
          "hostname": "volsync.volsync.svc.cluster.local",
          "username": "volsync",
          "description": "volsync",
          "enableActions": false
        }

persistence:
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/repository.config
        subPath: repository.config

  repository:
    type: nfs
    server: nas.internal
    path: /mnt/user/backups/Kopia
    globalMounts:
      - path: /repository

  tmpfs:
    type: emptyDir
    advancedMounts:
      kopia:
        app:
          - path: /config/cache
            subPath: cache
          - path: /config/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
