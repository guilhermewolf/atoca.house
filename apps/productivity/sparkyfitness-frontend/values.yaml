---
controllers:
  main:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      main:
        image:
          # renovate: datasource=docker depName=ghcr.io/codewithcj/sparkyfitness-frontend
          repository: ghcr.io/codewithcj/sparkyfitness-frontend
          tag: v0.16.4.5@sha256:cb719e99b3dd4e8dc10b6e00c727071e41582601dfdd3551b55b1ba2e369b3ab
        env:
          PROMETHEUS_ENABLED: "true"
          SPARKY_FITNESS_LOG_LEVEL: info
          SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server.sparkfitness.svc.cluster.local
          SPARKY_FITNESS_SERVER_PORT: 3010
        resources:
          requests:
            cpu: 15m
            memory: 64M
          limits:
            memory: 64M
service:
  main:
    controller: main
    ports:
      http:
        port: &httpPort 80

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - fitness.atoca.house
    rules:
      - backendRefs:
          - name: sparkyfitness-frontend
            port: *httpPort
        matches:
          - path:
              type: PathPrefix
              value: /
