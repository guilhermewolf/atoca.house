---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: memory-mcp
  namespace: mcp
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: atoca-house-internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - memory-mcp.atoca.house
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: mcp-memory-mcp-proxy
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
