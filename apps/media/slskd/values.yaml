controllers:
  slskd:
    type: statefulset
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      slskd:
        image:
          repository: ghcr.io/slskd/slskd
          tag: 0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3
        env:
          DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp/.net
          PUID: 99
          PGID: 100
          SLSKD_APP_DIR: /config
          SLSKD_HTTP_PORT: &port 80
          SLSKD_NO_AUTH: true
          SLSKD_NO_HTTPS: true
          SLSKD_NO_VERSION_CHECK: true
          SLSKD_SLSK_LISTEN_PORT: 50429
        envFrom:
          - secretRef:
              name: "slskd-secret"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *port
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "SETUID", "SETGID"]
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 3Gi
    statefulset:
      volumeClaimTemplates:
        - name: config
          storageClass: ceph-block
          accessMode: ReadWriteOnce
          size: 5Gi
defaultPodOptions:
  annotations:
    k8s.v1.cni.cncf.io/networks: |-
      [{
        "name": "vpn",
        "namespace": "kube-system",
        "ips": ["192.168.90.12/24"],
        "mac": "c6:58:f2:a7:62:ce"
      }]
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 100
    fsGroupChangePolicy: OnRootMismatch

service:
  slskd:
    controller: slskd
    ports:
      http:
        port: *port
route:
  slskd:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - slskd.atoca.house
    rules:
      - backendRefs:
          - name: slskd
            port: 80
        matches:
          - path:
              type: PathPrefix
              value: /

configMaps:
  config:
    data:
      slskd.yml: |-
        directories:
          incomplete: /downloads/incomplete
          downloads: /downloads/complete
        permissions:
          file:
            mode: 750
        shares:
          directories:
            - /playlists
          filters:
            - \.ini$
            - Thumbs.db$
            - \.DS_Store$
persistence:
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /config/slskd.yml
        subPath: slskd.yml
  media:
    type: nfs
    server: nas.internal
    path: /mnt/user/data/slskd
    globalMounts:
      - path: /downloads/

  playlists:
    type: nfs
    server: nas.internal
    path: /mnt/user/musics/playlists
    globalMounts:
      - path: /playlists
  tmp:
    type: emptyDir
