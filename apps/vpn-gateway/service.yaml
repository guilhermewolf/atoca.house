apiVersion: v1
kind: Service
metadata:
  name: gluetun-http-proxy
  namespace: vpn-gateway
  labels:
    app: gluetun
    service: http-proxy
spec:
  type: ClusterIP
  selector:
    app: gluetun
  ports:
    - name: http-proxy
      port: 8888
      targetPort: 8888
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
---
apiVersion: v1
kind: Service
metadata:
  name: gluetun-socks5-proxy
  namespace: vpn-gateway
  labels:
    app: gluetun
    service: socks5-proxy
spec:
  type: ClusterIP
  selector:
    app: gluetun
  ports:
    - name: socks5-proxy
      port: 1080
      targetPort: 1080
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
