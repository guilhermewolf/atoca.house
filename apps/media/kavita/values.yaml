---
controllers:
  kavita:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/kareadita/kavita
          tag: 0.9.0@sha256:36aab0c578d488f8b10bd33910953b50965aff9ac6adc476ef4692c38c60427e
        env:
          # readOnlyRootFilesystem makes /tmp & /var/tmp read-only; point SQLite/temp at the writable emptyDir
          TMPDIR: /tmp
        resources:
          requests:
            cpu: 15m
            memory: 1Gi
          limits:
            memory: 4Gi
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 99
    runAsGroup: 100
    fsGroup: 100
    fsGroupChangePolicy: OnRootMismatch

service:
  app:
    ports:
      http:
        port: 5000

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - kavita.atoca.house
    rules:
      - backendRefs:
          - name: kavita
            port: 5000
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp

  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 3Gi
    globalMounts:
      - path: /kavita/config

  media:
    type: nfs
    server: nas.internal
    path: /mnt/user/data/
    globalMounts:
      - path: /data
