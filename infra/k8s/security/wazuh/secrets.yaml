---
# Single consolidated secret consumed by the morgoved/wazuh-helm chart via:
#   indexer.cred.existingSecret    -> INDEXER_PASSWORD, INDEXER_PASSWORD_HASH
#   dashboard.cred.existingSecret  -> DASHBOARD_USERNAME, DASHBOARD_PASSWORD, DASHBOARD_PASSWORD_HASH
#   wazuh.apiCred.existingSecret   -> API_USERNAME, API_PASSWORD
#   wazuh.authd.existingSecret     -> authd.pass (mounted as file, requires lowercase dotted key)
#
# Password hashes must be bcrypt, 12 rounds. Generate with:
#   docker run --rm -ti wazuh/wazuh-indexer:4.14.1 \
#     bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh
#
# 1Password item "wazuh" must expose fields prefixed with WAZUH_ so they appear
# as template vars here (the onepassword-connect store uses `extract: key: wazuh`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshInterval: 1h
  target:
    name: wazuh-secret
    template:
      engineVersion: v2
      data:
        # Indexer (admin user used by filebeat on the manager)
        INDEXER_USERNAME: "admin"
        INDEXER_PASSWORD: "{{ .WAZUH_INDEXER_PASSWORD }}"
        INDEXER_PASSWORD_HASH: "{{ .WAZUH_INDEXER_PASSWORD_HASH }}"
        # Dashboard (kibanaserver user used by dashboard -> indexer)
        DASHBOARD_USERNAME: "kibanaserver"
        DASHBOARD_PASSWORD: "{{ .WAZUH_DASHBOARD_PASSWORD }}"
        DASHBOARD_PASSWORD_HASH: "{{ .WAZUH_DASHBOARD_PASSWORD_HASH }}"
        # Wazuh API (dashboard -> manager API)
        API_USERNAME: "wazuh-wui"
        API_PASSWORD: "{{ .WAZUH_API_PASSWORD }}"
        # Authd agent enrollment password — chart mounts this as a file,
        # subPath "authd.pass", so the secret key MUST be lowercase+dot.
        authd.pass: "{{ .WAZUH_AUTHD_PASSWORD }}"
  dataFrom:
    - extract:
        key: wazuh-secret
