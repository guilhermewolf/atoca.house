---
# All Wazuh credentials live in a single 1Password item ("wazuh-secret") and
# flow into this cluster Secret via External Secrets Operator + 1Password Connect.
#
# The chart reads these keys via existingSecret fields (indexer.cred,
# dashboard.cred, wazuh.apiCred, wazuh.authd) — both at Helm render time
# (internal_users.yml via the `lookup` function) and at pod runtime (envFrom
# on the manager, volume mount for authd).
#
# Required fields in the 1Password item "wazuh-secret":
#   WAZUH_INDEXER_PASSWORD        plain password for the "admin" user
#   WAZUH_INDEXER_PASSWORD_HASH   bcrypt hash (cost 12) of the above
#   WAZUH_DASHBOARD_PASSWORD      plain password for "kibanaserver" user
#   WAZUH_DASHBOARD_PASSWORD_HASH bcrypt hash (cost 12) of the above
#   WAZUH_API_PASSWORD            manager API password (8-64 chars, upper+lower+digit+symbol .*+?-)
#   WAZUH_AUTHD_PASSWORD          agent enrollment shared secret
#
# Generate bcrypt hashes with the chart's own tool (matches cost=12):
#   docker run --rm -ti wazuh/wazuh-indexer:4.14.1 \
#     bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshInterval: 1h
  target:
    name: wazuh-secret
    template:
      engineVersion: v2
      data:
        # Indexer — filebeat on the manager authenticates as "admin".
        INDEXER_USERNAME: "admin"
        INDEXER_PASSWORD: "{{ .WAZUH_INDEXER_PASSWORD }}"
        INDEXER_PASSWORD_HASH: "{{ .WAZUH_INDEXER_PASSWORD_HASH }}"
        # Dashboard — dashboard pod authenticates as "kibanaserver".
        DASHBOARD_USERNAME: "kibanaserver"
        DASHBOARD_PASSWORD: "{{ .WAZUH_DASHBOARD_PASSWORD }}"
        DASHBOARD_PASSWORD_HASH: "{{ .WAZUH_DASHBOARD_PASSWORD_HASH }}"
        # Wazuh manager API — consumed by the dashboard.
        API_USERNAME: "wazuh-wui"
        API_PASSWORD: "{{ .WAZUH_API_PASSWORD }}"
        # Authd — chart mounts this secret with subPath "authd.pass", so the
        # key MUST be lowercase + dot. Agents use this shared secret to enroll.
        authd.pass: "{{ .WAZUH_AUTHD_PASSWORD }}"
  dataFrom:
    - extract:
        key: wazuh-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
