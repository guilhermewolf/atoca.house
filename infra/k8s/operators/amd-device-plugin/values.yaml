---
controllers:
  amd-device-plugin:
    type: daemonset

    containers:
      app:
        image:
          repository: docker.io/rocm/k8s-device-plugin
          tag: 1.31.0.10@sha256:0555caf9ccc1cf407b353d1aade87d4598059f87a784085aafe3ece19405b612

        workingDir: /root

        command: ["./k8s-device-plugin"]

        args: ["-logtostderr=true", "-stderrthreshold=INFO", "-v=5"]

        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            memory: 100Mi

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

service:
  app:
    enabled: false
    controller: amd-device-plugin

persistence:
  sys:
    enabled: true
    type: hostPath
    hostPath: /sys

  device-plugins:
    enabled: true
    type: hostPath
    hostPath: /var/lib/kubelet/device-plugins
