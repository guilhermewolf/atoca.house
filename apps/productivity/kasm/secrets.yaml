---
# kasmapp credentials from Crunchy Postgres
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kasm-db-secret
  namespace: kasm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: kasm-db-secret
    template:
      data:
        password: "{{ .password }}"
  dataFrom:
    - extract:
        key: postgres-pguser-kasmapp
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
# Postgres superuser — used only by the DB init job on first deploy
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kasm-postgres-master-secret
  namespace: kasm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: kasm-postgres-master-secret
    template:
      data:
        password: "{{ .password }}"
  dataFrom:
    - extract:
        key: postgres-pguser-postgres
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
