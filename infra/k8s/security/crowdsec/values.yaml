---
container_runtime: containerd
config:
  parsers:
    s01-parse:
      envoy-logs.yaml: |-
        # Exact match on 'envoy' so the cilium-envoy fallback acquisition
        # (program: cilium-envoy) does not accidentally get parsed here.
        filter: "evt.Parsed.program == 'envoy' && evt.Parsed.message contains ':authority'"
        onsuccess: next_stage
        name: hydaz/envoy-logs
        description: "Parse Envoy access logs to match nginx parser outputs"
        statics:
          - parsed: json
            expression: UnmarshalJSON(evt.Parsed.message, evt.Unmarshaled, "envoy")
          - parsed: time_local
            expression: evt.Unmarshaled.envoy["start_time"]
          - parsed: remote_addr
            expression: Split(evt.Unmarshaled.envoy["x-forwarded-for"], ",")[0]
          - parsed: verb
            expression: evt.Unmarshaled.envoy["method"]
          - parsed: request
            expression: evt.Unmarshaled.envoy["x-envoy-origin-path"]
          - parsed: http_version
            expression: TrimPrefix(evt.Unmarshaled.envoy["protocol"], "HTTP/")
          - parsed: status
            expression: Sprintf('%.0f', evt.Unmarshaled.envoy["response_code"])
          - parsed: body_bytes_sent
            expression: Sprintf('%.0f', evt.Unmarshaled.envoy["bytes_sent"])
          - parsed: http_user_agent
            expression: evt.Unmarshaled.envoy["user-agent"]
          - parsed: target_fqdn
            expression: evt.Unmarshaled.envoy[":authority"]
          - meta: service
            value: http
          - meta: log_type
            value: http_access-log
          - meta: source_ip
            expression: evt.Parsed.remote_addr
          - meta: http_status
            expression: evt.Parsed.status
          - meta: http_path
            expression: evt.Parsed.request
          - meta: http_verb
            expression: evt.Parsed.verb
          - meta: http_user_agent
            expression: evt.Parsed.http_user_agent
          - meta: target_fqdn
            expression: evt.Parsed.target_fqdn
    s02-enrich:
      envoy-418-whitelist.yaml: |-
        name: hydaz/envoy-418-whitelist
        description: "Whitelist 418 responses from the envoy bouncer to prevent processing already banned IPs"
        filter: "evt.Meta.service == 'http' && evt.Meta.log_type == 'http_access-log'"
        whitelist:
          reason: "envoy bouncer response to already banned ips"
          expression:
            - "evt.Meta.http_status == '418'"
  config.yaml.local: |-
    api:
      server:
        auto_registration:
          enabled: true
          token: "${REGISTRATION_TOKEN}"
          allowed_ranges:
            - "127.0.0.1/32"
            - "10.244.0.0/16"
    db_config:
      type: postgresql
      host: "${DB_HOST}"
      port: 5432
      user: "${DB_USERNAME}"
      password: "${DB_PASSWORD}"
      db_name: "${DB_NAME}"
      sslmode: require
  agent_config.yaml.local: |-
    api:
      client:
        unregister_on_exit: false
  appsec_config.yaml.local: |-
    api:
      client:
        unregister_on_exit: false
  profiles.yaml: |-
    # AppSec/WAF hits: short ban (5 minutes). CRS and virtual-patching can
    # throw false positives on SPAs and API clients; don't nuke a legit
    # session for 24h because of a single bad query string.
    name: appsec_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip" && Alert.GetScenario() contains "appsec"
    decisions:
      - type: ban
        duration: 5m
    on_success: break
    ---
    # Default IP ban for all other scenarios. 24h is the CrowdSec recommended
    # default. Escalation via duration_expr was considered but the expr
    # helper surface in v1.7.7 doesn't expose historical ban duration in a
    # way we can cleanly use from a profile — revisit on a newer release.
    name: default_ip_remediation
    debug: false
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip"
    decisions:
      - type: ban
        duration: 24h
    on_success: break
secrets:
  externalSecret:
    name: crowdsec-lapi-secrets
lapi:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  env:
    - name: ENROLL_INSTANCE_NAME
      value: cluster
  envFrom:
    - secretRef:
        name: crowdsec-secrets
    - secretRef:
        name: crowdsec-db-secrets
  persistentVolume:
    data:
      enabled: false
    config:
      enabled: false
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
agent:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  acquisition:
    # Envoy Gateway access logs (both external and internal). This is the
    # primary signal source — the `hydaz/envoy-logs` custom parser turns the
    # envoy JSON access-log format into nginx-compatible fields.
    - namespace: kube-system
      podName: atoca-house-*
      program: envoy
      poll_without_inotify: true
    # Cilium agent runs as a DaemonSet on every node and writes several
    # thousand lines per day (health checks, policy updates). We don't have
    # a parser for it, so lines are silently dropped at s01-parse — but the
    # `lines_read` counter still increments, which is what the CrowdSec
    # Console checks to decide whether an agent is healthy. Without this,
    # agents scheduled on nodes that happen to host neither an atoca-house
    # nor an authelia pod would trigger false "Log Processor: no logs read"
    # alerts. Pattern matches both `cilium-*` (agent) and `cilium-envoy-*`.
    # The `envoy-logs` parser uses an exact program match (`== 'envoy'`)
    # so it will not try to parse these lines.
    - namespace: kube-system
      podName: cilium-*
      program: cilium
      poll_without_inotify: true
    # Authelia access/auth logs for brute-force detection.
    - namespace: authelia
      podName: authelia-*
      program: authelia
      poll_without_inotify: true
  env:
    - name: COLLECTIONS
      value: >-
        crowdsecurity/base-http-scenarios
        crowdsecurity/http-cve
        LePresidente/authelia
        MrShippeR/filebrowser
    - name: PARSERS
      value: crowdsecurity/cri-logs
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
appsec:
  enabled: true
  podAnnotations:
    reloader.stakater.com/auto: "true"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  acquisitions:
    - source: appsec
      listen_addr: "0.0.0.0:7422"
      path: /
      appsec_config: crowdsecurity/appsec-default
      labels:
        type: appsec
  env:
    - name: COLLECTIONS
      value: >-
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
        crowdsecurity/appsec-crs
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
