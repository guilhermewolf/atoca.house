---
fullnameOverride: unifi-dns
provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/kashalls/external-dns-unifi-webhook
      tag: v0.9.0@sha256:22f4106f44a0b9ac3c97cf29bbfef93026c1164492152dc797a1d6dc86ddfbb5
    env:
      - name: UNIFI_HOST
        value: https://unifi.internal
      - name: UNIFI_API_KEY
        valueFrom:
          secretKeyRef:
            name: external-dns-unifi-secret
            key: external_dns_api_key
    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        path: /readyz
        port: http-webhook
      initialDelaySeconds: 10
      timeoutSeconds: 5

extraArgs:
  - --annotation-filter=externaldns.enable.custom/internal notin (false,no)

triggerLoopOnEvent: true
policy: sync

sources:
  - gateway-httproute
  - service

txtOwnerId: main

txtPrefix: "k8s-%{record_type}."

domainFilters:
  - atoca.house

serviceMonitor:
  enabled: true

podAnnotations:
  secret.reloader.stakater.com/reload: external-dns-unifi-secret
