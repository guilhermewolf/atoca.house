---
externalRedis:
  enabled: true
  host: dragonfly.dragonfly-cluster.svc.cluster.local
  port: 6379

image:
  flavor: fpm-alpine

nginx:
  enabled: true

nextcloud:
  datadir: /var/www/data
  existingSecret:
    enabled: true
    secretName: nextcloud-secret
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
  host: &host cloud.atoca.house
  mail:
    enabled: false
  configs:
    proxy.config.php: |-
      <?php
      $CONFIG = array (
        'check_data_directory_permissions' => false,
        'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
        'mail_smtpmode' => 'null',
        'skeletondirectory' => '',
        'trusted_proxies' => array(
          0 => '127.0.0.1',
          1 => '10.244.0.0/16',
        ),
      ); ?>
    misc.config.php: |-
      <?php
      $CONFIG = array (
        'default_phone_region' => 'NL',
        'maintenance_window_start' => 2,
      ); ?>

httpRoute:
  enabled: true
  hostnames:
    - *host
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: atoca-house-internal
      namespace: kube-system
  rules:
    - backendRefs:
        - kind: Service
          group: ""
          name: nextcloud
          port: http
      matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: strict-transport-security
                value: max-age=31536000

persistence:
  enabled: true
  type: persistentVolumeClaim
  storageClass: ceph-block
  accessMode: ReadWriteOnce
  size: 5Gi
