---
# app-template v5 runs the daemonset under the release-name ServiceAccount it
# creates by default (amd-device-labeller). Bind the node-labeller permissions to
# that SA. No standalone ServiceAccount/token is needed — the chart owns it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: amd-gpu-node-labeller
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "get", "list", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: amd-gpu-node-labeller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: amd-gpu-node-labeller
subjects:
  - kind: ServiceAccount
    name: amd-device-labeller
    namespace: kube-system
