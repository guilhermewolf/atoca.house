---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glance
  annotations:
    reloader.stakater.com/match: "true"
data:
  glance.yml: |
    server:
      port: 80
      proxied: true

    theme:
      background-color: 240 21 15
      primary-color: 224 76 65
      positive-color: 142 71 45
      negative-color: 0 72 51

    pages:
      # -----------------------------------------------------------------------
      # HOME — default landing page, friendly for everyone
      # -----------------------------------------------------------------------
      - name: Home
        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: 24h
                timezones:
                  - timezone: Europe/Amsterdam
                    label: Home

              - type: calendar
                first-day-of-week: monday

              - type: weather
                location: Amsterdam
                units: metric
                hour-format: 24h

          - size: full
            widgets:
              - type: search
                search-engine: https://www.google.com/search?q={QUERY}
                new-tab: true
                autofocus: true


              - type: group
                widgets:
                  - type: rss
                    title: The Guardian
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://www.theguardian.com/world/rss
                        title: TheGuardian

                  - type: rss
                    title: Folha
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://feeds.folha.uol.com.br/emcimadahora/rss091.xml
                        title: Folha de SP

                  - type: rss
                    title: TheVerge
                    cache: 12h
                    limit: 18
                    colapse-after: 8
                    feeds:
                      - url: https://theverge.com/rss/index.xml
                        title: TheVerge


          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Watch
                    color: 224 90 65
                    links:
                      - title: Jellyfin
                        url: https://jellyfin.atoca.house
                        icon: sh:jellyfin-light
                      - title: Request a Movie or Show
                        url: https://seerr.atoca.house
                        icon: sh:seerr-light

                  - title: Kitchen
                    color: 30 85 55
                    links:
                      - title: Recipes
                        url: https://mealie.atoca.house
                        icon: sh:mealie-light

                  - title: Get Things Done
                    color: 262 72 65
                    links:
                      - title: Tasks
                        url: https://vikunja.atoca.house
                        icon: sh:vikunja-light
                      - title: Notes
                        url: https://outline.atoca.house
                        icon: sh:outline-light
                      - title: Wiki
                        url: https://wiki.atoca.house
                        icon: sh:wiki-js-light

                  - title: Personal
                    color: 160 60 45
                    links:
                      - title: Fitness Tracker
                        url: https://fitness.atoca.house
                        icon:
                      - title: Library
                        url: https://booklore.atoca.house
                        icon: sh:booklore-light
                      - title: Bookmarks
                        url: https://shelfmark.atoca.house
                        icon: sh:shelfmark-light
                      - title: Homebridge
                        url: https://homebridge.atoca.house
                        icon: sh:homebridge-light
                      - title: AI Chat
                        url: https://chat.atoca.house
                        icon: sh:open-webui-light


      # -----------------------------------------------------------------------
      # ENTERTAINMENT — streaming + download automation
      # -----------------------------------------------------------------------
      - name: Entertainment
        columns:
          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Streaming
                    color: 224 90 65
                    links:
                      - title: Jellyfin
                        url: https://jellyfin.atoca.house
                        icon: sh:jellyfin-light
                      - title: Seerr (Requests)
                        url: https://seerr.atoca.house
                        icon: sh:jellyseerr-light
                      - title: Dispatcharr
                        url: https://dispatcharr.atoca.house
                        icon: sh:dispatcharr-light

                  - title: Downloads
                    color: 38 85 55
                    links:
                      - title: qBittorrent
                        url: https://qbittorrent.atoca.house
                        icon: sh:qbittorrent-light
                      - title: SABnzbd
                        url: https://sabnzbd.atoca.house
                        icon: sh:sabnzbd-light
                      - title: Autobrr
                        url: https://autobrr.atoca.house
                        icon: sh:autobrr-light
                      - title: SLSKD (Music)
                        url: https://slskd.atoca.house
                        icon: sh:slskd-light

                  - title: Reading & Music
                    color: 262 72 65
                    links:
                      - title: Booklore
                        url: https://booklore.atoca.house
                        icon: sh:booklore
                      - title: Shelfmark
                        url: https://shelfmark.atoca.house
                        icon: sh:shelfmark
                      - title: Soulsync
                        url: https://soulsync.atoca.house

          - size: full
            widgets:
              - type: monitor
                title: Media Services
                cache: 2m
                sites:
                  - title: Jellyfin
                    url: https://jellyfin.atoca.house
                    icon: sh:jellyfin-light
                  - title: Seerr
                    url: https://seerr.atoca.house
                    icon: sh:seerr-light
                  - title: Radarr
                    url: https://radarr.atoca.house
                    icon: sh:radarr-light
                  - title: Sonarr
                    url: https://sonarr.atoca.house
                    icon: sh:sonarr-light
                  - title: Sonarr Anime
                    url: https://anime.atoca.house
                    icon: sh:sonarr-light
                  - title: Bazarr
                    url: https://bazarr.atoca.house
                    icon: sh:bazarr-light
                  - title: Prowlarr
                    url: https://prowlarr.atoca.house
                    icon: sh:prowlarr-light
                  - title: qBittorrent
                    url: https://qbittorrent.atoca.house
                    icon: sh:qbittorrent-light
                  - title: SABnzbd
                    url: https://sabnzbd.atoca.house
                    icon: sh:sabnzbd-light
                  - title: Autobrr
                    url: https://autobrr.atoca.house
                    icon: sh:autobrr-light
                  - title: SLSKD
                    url: https://slskd.atoca.house
                    icon: sh:slskd-light

              - type: bookmarks
                groups:
                  - title: Content Managers
                    links:
                      - title: Radarr (Movies)
                        url: https://radarr.atoca.house
                        icon: sh:radarr-light
                      - title: Sonarr (TV)
                        url: https://sonarr.atoca.house
                        icon: sh:sonarr-light
                      - title: Sonarr (Anime)
                        url: https://anime.atoca.house
                        icon: sh:sonarr-light
                      - title: Bazarr (Subtitles)
                        url: https://bazarr.atoca.house
                        icon: sh:bazarr-light
                      - title: Prowlarr (Indexers)
                        url: https://prowlarr.atoca.house
                        icon: sh:prowlarr-light
                      - title: 3D Printing — Spoolman
                        url: https://spoolman.atoca.house
                        icon: sh:spoolman-light

      # -----------------------------------------------------------------------
      # FEED — tech news, self-hosted community, release tracking
      # -----------------------------------------------------------------------
      - name: Feed
        head-widgets:
          - type: markets
            hide-header: true
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: EURUSD=X
                name: EUR/USD

        columns:
          - size: full
            widgets:
              - type: group
                widgets:
                  - type: hacker-news
                    sort-by: best
                    limit: 18
                    collapse-after: 8

                  - type: lobsters
                    sort-by: hot
                    limit: 18
                    collapse-after: 8

                  - type: reddit
                    subreddit: selfhosted
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: homelab
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: kubernetes
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

                  - type: reddit
                    subreddit: homeautomation
                    show-thumbnails: true
                    sort-by: top
                    limit: 15
                    collapse-after: 8

          - size: small
            widgets:
              - type: rss
                title: Self-Hosted News
                cache: 12h
                limit: 10
                collapse-after: 5
                feeds:
                  - url: https://selfh.st/rss/
                    title: selfh.st
                  - url: https://blog.cloudflare.com/rss
                    title: Cloudflare Blog

      # -----------------------------------------------------------------------
      # ADMIN — cluster management, monitoring, infra tools
      # -----------------------------------------------------------------------
      - name: Admin
        columns:
          - size: small
            widgets:
              - type: extension
                title: Cluster Nodes
                url: http://glance-k8s-extension:8080/extension/nodes
                allow-potentially-dangerous-html: true
                cache: 10s

          - size: full
            widgets:
              - type: monitor
                title: Infrastructure Health
                cache: 1m
                sites:
                  - title: ArgoCD
                    url: https://argocd.atoca.house
                    icon: sh:argo-cd-light
                  - title: Authelia
                    url: https://auth.atoca.house/api/health
                    icon: sh:authelia-light
                  - title: Grafana
                    url: https://grafana.atoca.house
                    icon: sh:grafana-light
                  - title: Prometheus
                    url: https://prometheus.atoca.house
                    icon: sh:prometheus-light
                  - title: Gatus
                    url: https://status.atoca.house
                    icon: sh:gatus-light
                  - title: VictoriaLogs
                    url: https://victoria-logs.atoca.house
                    icon: sh:victoriametrics-light
                  - title: Open WebUI
                    url: https://chat.atoca.house
                    icon: sh:open-webui-light
                  - title: Outline
                    url: https://outline.atoca.house
                    icon: sh:outline-light
                  - title: Vikunja
                    url: https://vikunja.atoca.house
                    icon: sh:vikunja-light
                  - title: Mealie
                    url: https://mealie.atoca.house
                    icon: sh:mealie-light
                  - title: n8n
                    url: https://n8n.atoca.house
                    icon: sh:n8n-light

              - type: bookmarks
                groups:
                  - title: Observability
                    links:
                      - title: Grafana
                        url: https://grafana.atoca.house
                        icon: sh:grafana-light
                      - title: Prometheus
                        url: https://prometheus.atoca.house
                        icon: sh:prometheus-light
                      - title: AlertManager
                        url: https://alertmanager.atoca.house
                        icon: sh:grafana-alerts-dashboard-light
                      - title: Gatus
                        url: https://status.atoca.house
                        icon: sh:gatus-light
                      - title: VictoriaLogs
                        url: https://victorialogs.atoca.house
                        icon: sh:victoriametrics-light

                  - title: AI & Dev
                    links:
                      - title: Open WebUI
                        url: https://chat.atoca.house
                        icon: sh:open-webui-light
                      - title: OpenClaw
                        url: https://claw.atoca.house
                        icon: sh:openclaw-light
                      - title: SearXNG
                        url: https://search.atoca.house
                        icon: sh:searxng-light
                      - title: IRC — TheLounge
                        url: https://thelounge.atoca.house
                        icon: sh:the-lounge-light

                  - title: Productivity
                    links:
                      - title: Twenty CRM
                        url: https://twenty.atoca.house
                        icon: sh:twenty-light
                      - title: Vikunja
                        url: https://vikunja.atoca.house
                        icon: sh:vikunja-light
                      - title: Outline
                        url: https://outline.atoca.house
                        icon: sh:outline-light
                      - title: Wiki
                        url: https://wiki.atoca.house
                        icon: sh:wiki-js-light

              - type: repository
                repository: guilhermewolf/atoca.house
                pull-requests-limit: 10
                issues-limit: 3
                commits-limit: 3

          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Cluster
                    color: 224 90 65
                    links:
                      - title: ArgoCD
                        url: https://argocd.atoca.house
                        icon: sh:argo-cd-light
                      - title: Headlamp
                        url: https://headlamp.atoca.house
                        icon: sh:headlamp-light

                  - title: Identity & Auth
                    color: 262 72 65
                    links:
                      - title: Authelia
                        url: https://auth.atoca.house
                        icon: sh:authelia-light
                      - title: LLDAP
                        url: https://lldap.atoca.house
                        icon: sh:lldap-light

                  - title: Storage
                    color: 38 85 55
                    links:
                      - title: Rook-Ceph
                        url: https://rook.atoca.house
                        icon: sh:ceph-light
                      - title: pgAdmin
                        url: https://pgadmin.atoca.house
                        icon: sh:pgadmin-light

                  - title: Network
                    color: 160 60 45
                    links:
                      - title: Cloudflare
                        url: https://dash.cloudflare.com
                        icon: sh:cloudflare-light
                      - title: UniFi Toolkit
                        url: https://ui-toolkit.atoca.house
                        icon: sh:ubiquiti-unifi-light

                  - title: Files & Automation
                    links:
                      - title: FileBrowser
                        url: https://filebrowser.atoca.house
                        icon: sh:file-browser-light
                      - title: n8n
                        url: https://n8n.atoca.house
                        icon: sh:n8n-light
