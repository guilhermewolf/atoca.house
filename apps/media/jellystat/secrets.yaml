---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellystat-secret
  namespace: jellystat
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: jellystat-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Jellystat
        JWT_SECRET: "{{ .JWT_SECRET }}"

  dataFrom:
    - extract:
        key: jellystat-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-pguser-jellystat
  namespace: jellystat
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: jellystat-db-secret
    template:
      data:
        POSTGRES_DB: '{{ index . "dbname" }}'
        POSTGRES_IP: '{{ index . "host" }}'
        POSTGRES_USER: '{{ index . "user" }}'
        POSTGRES_PASSWORD: '{{ index . "password" }}'
        POSTGRES_PORT: "5432"
        # TLS required; server cert verified against the cert-manager CA mounted
        # at /etc/ssl/postgres/ca.crt and trusted via NODE_EXTRA_CA_CERTS
        # (values.yaml) — replaces PGSSLMODE=no-verify.
        PGSSLMODE: "require"
  dataFrom:
    - extract:
        key: postgres-pguser-jellystat
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
