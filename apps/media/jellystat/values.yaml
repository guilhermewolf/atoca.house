---
controllers:
  jellystat:
    annotations:
      reloader.stakater.com/auto: "true"

    containers:
      app:
        image:
          repository: cyfershepard/jellystat
          tag: 1.1.11@sha256:c4e2dfa8bddf8d5ac3a675d7202f71a54dcfe3540cc186899d9201e0fe701fa5
        env:
          NODE_EXTRA_CA_CERTS: /etc/ssl/postgres/ca.crt
        envFrom:
          - secretRef:
              name: jellystat-secret
          - secretRef:
              name: jellystat-db-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: [ "ALL" ] }
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 10m
            memory: 200Mi
          limits:
            memory: 1000Mi
    pod:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
persistence:
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /etc/ssl/postgres/ca.crt
        subPath: ca.crt
        readOnly: true

service:
  app:
    controller: jellystat
    ports:
      http:
        port: &port 3000

route:
  jellystat:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - jellystat.atoca.house
    rules:
      - backendRefs:
          - name: jellystat
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /
