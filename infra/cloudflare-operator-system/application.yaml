#TODO: make it work with kustomize
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-operator-system
  namespace: argocd
spec:
  destination:
    namespace: cloudflare-operator-system
    server: https://kubernetes.default.svc
  project: infra
  sources:
    - chart: cloudflare-operator-system
      repoURL: https://charts.jetstack.io
      targetRevision: 1.15.1
      helm:
        valueFiles:
        - $values/infra/cloudflare-operator-system/values.yaml
    - repoURL: 'https://github.com/guilhermewolf/atoca.house'
      targetRevision: HEAD
      ref: values
    - repoURL: 'https://github.com/guilhermewolf/atoca.house'
      targetRevision: HEAD
      path: infra/cloudflare-operator-system/
      directory:
        exclude: '{application.yaml,values.yaml}'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true