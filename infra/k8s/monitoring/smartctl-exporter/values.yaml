---
fullnameOverride: smartctl-exporter
serviceMonitor:
  enabled: true
  relabelings:
    - action: labeldrop
      regex: (pod)
    - action: replace
      regex: (.*)
      replacement: $1.atoca.house
      sourceLabels:
        - __meta_kubernetes_endpoint_node_name
      targetLabel: instance
prometheusRules:
  enabled: false
