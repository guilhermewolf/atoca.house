---
controllers:
  wiki:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      wiki:
        image:
          repository: ghcr.io/requarks/wiki
          tag: 2.5.314
        env:
          APP_URL: "https://wiki.atoca.house"
          DB_TYPE: postgres
          DB_SSL: "true"
          # Trust the cert-manager postgres-ca (trust-manager ConfigMap mounted
          # below) via Node's trust store, so DB_SSL verifies the server cert.
          NODE_EXTRA_CA_CERTS: /etc/ssl/postgres/ca.crt
        envFrom:
          - secretRef:
              name: wiki-db-secret
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                httpHeaders:
                  - name: Host
                    value: wiki.atoca.house
                path: /healthz
                port: 3000
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
persistence:
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /etc/ssl/postgres/ca.crt
        subPath: ca.crt
        readOnly: true

service:
  wiki:
    controller: wiki
    ports:
      http:
        port: 3000

route:
  wiki:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - wiki.atoca.house
    rules:
      - backendRefs:
          - name: wiki
            port: 3000
        matches:
          - path:
              type: PathPrefix
              value: /
