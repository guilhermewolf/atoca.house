---
controllers:
  crowdsec-envoy-bouncer:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/kdwils/envoy-proxy-bouncer
          # renovate: datasource=github-releases depName=kdwils/envoy-proxy-bouncer
          tag: v0.6.1
        env:
          ENVOY_BOUNCER_BOUNCER_BANSTATUSCODE: 418
          ENVOY_BOUNCER_BOUNCER_ENABLED: true
          ENVOY_BOUNCER_BOUNCER_LAPIURL: http://crowdsec-service.crowdsec.svc.cluster.local:8080
          # v0.6+: report bouncer heartbeat/metrics to LAPI every 60s.
          ENVOY_BOUNCER_BOUNCER_METRICSINTERVAL: 60s
          # v0.6+: native Prometheus /metrics endpoint.
          ENVOY_BOUNCER_PROMETHEUS_ENABLED: true
          ENVOY_BOUNCER_PROMETHEUS_PORT: 9090
          ENVOY_BOUNCER_TEMPLATES_DENIEDTEMPLATEPATH: /ban.html
          # Pod CIDR must be trusted so the bouncer walks X-Forwarded-For back to
          # the real client IP when requests arrive via cloudflare-tunnel pods.
          # Envoy Gateway's own ClientTrafficPolicy uses the same CIDR.
          ENVOY_BOUNCER_TRUSTEDPROXIES: 10.244.0.0/16,192.168.0.0/16
          ENVOY_BOUNCER_WAF_APPSECURL: http://crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
          ENVOY_BOUNCER_WAF_ENABLED: true
          ENVOY_BOUNCER_WAF_FAILOVERHTTP: true
        envFrom:
          - secretRef:
              name: envoy-bouncer-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
service:
  app:
    ports:
      http:
        port: 8080
      metrics:
        port: 9090
serviceMonitor:
  app:
    serviceName: envoy-bouncer
    endpoints:
      - port: metrics
        path: /metrics
        interval: 30s
persistence:
  ban:
    type: configMap
    name: "envoy-bouncer-configmap"
    globalMounts:
      - path: /ban.html
        subPath: ban.html
