---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  config.yaml: |
    # Hermes Agent configuration
    # Docs: https://hermes-agent.nousresearch.com/docs
    # Main model: ChatGPT Plus subscription (gpt-5.4) via litellm. This is the only
    # model the Plus plan exposes — codex-* names are rejected by the Codex backend
    # for ChatGPT accounts, so they can't be the main model here. On rate-limit/quota
    # litellm fails this over to local ollama (qwen3-14b) then cloud free-tier.
    model:
      default: chatgpt/gpt-5.4
      provider: custom:litellm
    providers:
      litellm:
        base_url: http://litellm.litellm.svc.cluster.local:4000/v1
        api_key: ${LITELLM_MASTER_KEY}
    # Auxiliary tasks run on cheap local ollama models instead of burning the
    # subscription. Titles -> small/fast gemma4-e4b; compression (conversation
    # summarization) -> the strongest local model, qwen3-14b, for fidelity.
    auxiliary:
      title_generation:
        provider: main
        model: gemma4-e4b
      compression:
        provider: main
        model: qwen3-14b
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    # Memory: built-in MEMORY.md/USER.md always active; external provider is additive.
    # Holographic = local SQLite (FTS5 + trust scoring + contradiction detection),
    # zero extra infra, no LLM/embeddings/Qdrant, no GPU. DB lives on the /opt/data
    # PVC (covered by Volsync backup). See plugins.hermes-memory-store below.
    memory:
      provider: holographic
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    group_sessions_per_user: false
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    web:
      search_backend: searxng
    discord:
      require_mention: false
      auto_thread: false
      reactions: false
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
      tool_use_enforcement: auto
    # Holographic memory store (local SQLite on the /opt/data PVC).
    plugins:
      hermes-memory-store:
        db_path: /opt/data/memory_store.db
        auto_extract: true
        default_trust: 0.5
    # External MCP servers. In-cluster ones go through the toolhive proxies in
    # the mcp namespace (streamable HTTP at /mcp, no auth for in-cluster
    # traffic — the proxies hold the upstream credentials). Env vars expand
    # the same way as LITELLM_MASTER_KEY above.
    mcp_servers:
      # PR flow against guilhermewolf/atoca.house — the hermes-docs-recommended
      # stdio server with a tool whitelist ("best default for sensitive
      # systems"). Token is a fine-grained PAT scoped to that repo only
      # (Contents RW, Pull requests RW, Metadata R), from hermes-secret.
      # merge_pull_request intentionally NOT whitelisted — humans merge.
      github:
        command: "npx"
        args: ["-y", "@modelcontextprotocol/server-github"]
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
        tools:
          include:
            - get_file_contents
            - search_code
            - list_commits
            - create_branch
            - push_files
            - create_or_update_file
            - create_pull_request
            - list_pull_requests
            - get_pull_request
            - get_pull_request_status
            - list_issues
            - create_issue
            - add_issue_comment
        prompts: false
        resources: false
      # n8n built-in instance-level MCP (N8N_MCP_ACCESS_ENABLED=true on the
      # n8n deploy). Probed: 401 without key = endpoint live.
      n8n:
        url: http://n8n.n8n.svc.cluster.local/mcp-server/http
        headers:
          Authorization: Bearer ${N8N_API_KEY}
      context7:
        url: http://mcp-context7-mcp-proxy.mcp.svc.cluster.local:8080/mcp
      memory:
        url: http://mcp-memory-mcp-proxy.mcp.svc.cluster.local:8080/mcp
      homeassistant:
        url: http://mcp-ha-mcp-proxy.mcp.svc.cluster.local:8080/mcp
    stt:
      enabled: true
      provider: local
      local:
        model: small
        language: ""
    tts:
      provider: openai
      openai:
        base_url: http://kokoro.kokoro.svc.cluster.local:8880/v1
        model: kokoro
        voice: af_heart
