---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- ChatGPT subscription (OAuth device-flow, only gpt-5.4 supported) ---
      - model_name: chatgpt/gpt-5.4
        model_info:
          mode: responses
        litellm_params:
          model: chatgpt/gpt-5.4
      # --- Free-tier cloud providers (rpm/tpm = free-plan caps; router throttles
      #     and fails over to local ollama on 429/cooldown) ---
      - model_name: groq-llama-3.3-70b
        litellm_params:
          model: groq/llama-3.3-70b-versatile
          rpm: 30
          tpm: 6000
      - model_name: cerebras-llama-3.3-70b
        litellm_params:
          model: cerebras/llama-3.3-70b
          rpm: 30
          tpm: 60000
      - model_name: openrouter-deepseek-r1
        litellm_params:
          model: openrouter/deepseek/deepseek-r1:free
          rpm: 20
      - model_name: mistral-small
        litellm_params:
          model: mistral/mistral-small-latest
          rpm: 60

      # --- Local ollama (RTX 4060 Ti 16GB, no rate limits) ---
      # Model names below mirror exactly what `ollama list` has pulled. Only one
      # ~9GB model fits in VRAM at a time, so cross-model fallbacks pay a cold-load.
      - model_name: qwen3-14b
        litellm_params:
          model: ollama_chat/qwen3:14b
          api_base: http://ollama.ollama.svc.cluster.local
      - model_name: qwen3.5-9b
        litellm_params:
          model: ollama_chat/qwen3.5:9b
          api_base: http://ollama.ollama.svc.cluster.local
      - model_name: gemma4-12b
        litellm_params:
          model: ollama_chat/gemma4:12b
          api_base: http://ollama.ollama.svc.cluster.local
      - model_name: gemma4-e4b
        litellm_params:
          model: ollama_chat/gemma4:e4b
          api_base: http://ollama.ollama.svc.cluster.local
      # Specialized: Home Assistant tool-calling model (3B). Routable for HA, not
      # used as a general fallback.
      - model_name: home-3b
        litellm_params:
          model: ollama_chat/fixt/home-3b-v3:latest
          api_base: http://ollama.ollama.svc.cluster.local
      # Embeddings (text-embedding). No chat fallback — different modality.
      - model_name: nomic-embed-text
        model_info:
          mode: embedding
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama.ollama.svc.cluster.local

    general_settings:
      health_check_endpoint: /v1/health

    router_settings:
      routing_strategy: simple-shuffle
      redis_url: os.environ/REDIS_URL
      redis_port: os.environ/REDIS_PORT
      # On free-tier 429/limit, cool the deployment down and fail over to local ollama
      allowed_fails: 2
      cooldown_time: 60
      fallbacks:
        - groq-llama-3.3-70b: ["cerebras-llama-3.3-70b", "qwen3-14b"]
        - cerebras-llama-3.3-70b: ["groq-llama-3.3-70b", "qwen3-14b"]
        - openrouter-deepseek-r1: ["qwen3-14b", "groq-llama-3.3-70b"]
        - mistral-small: ["qwen3.5-9b", "groq-llama-3.3-70b"]
        # Local models: cover cold-load/timeout hiccups. qwen3.5-9b loads faster
        # (smaller), then cloud (groq) as last resort so the agent never sees a
        # hard error.
        - qwen3-14b: ["qwen3.5-9b", "groq-llama-3.3-70b"]
        - qwen3.5-9b: ["qwen3-14b", "groq-llama-3.3-70b"]
        - gemma4-12b: ["qwen3-14b", "groq-llama-3.3-70b"]
        - gemma4-e4b: ["qwen3.5-9b", "groq-llama-3.3-70b"]
        # ChatGPT subscription is the main model: on rate-limit/quota, drop to the
        # strongest local model, then cloud free-tier.
        - chatgpt/gpt-5.4: ["qwen3-14b", "groq-llama-3.3-70b"]

    litellm_settings:
      success_callback: ["prometheus"]
      prometheus_adapter: true
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
      drop_params: false
      request_timeout: 600
      num_retries: 2
      retry_after: 5
      set_verbose: false

    environment:
      - REDIS_HOST
      - REDIS_PORT
