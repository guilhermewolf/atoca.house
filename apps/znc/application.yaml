apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: znc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/guilhermewolf/atoca.house
    targetRevision: main
    path: apps/znc
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
