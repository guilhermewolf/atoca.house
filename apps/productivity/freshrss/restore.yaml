---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: freshrss-restore
  namespace: freshrss
spec:
  trigger:
    manual: restore-once
  restic:
    repository: freshrss-r2-secret
    copyMethod: Direct
    destinationPVC: freshrss
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
    moverSecurityContext:
      runAsUser: 99
      runAsGroup: 100
      fsGroup: 100
