---
controllers:
  error-pages:
    replicas: 2
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/tarampampam/error-pages
          tag: 3.8.1
        env:
          TEMPLATE_NAME: lost-in-space
          SHOW_DETAILS: "false"
          LISTEN_PORT: &port 80
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 5m
            memory: 16M
          limits:
            memory: 32M
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }

defaultPodOptions:
  securityContext:
    runAsUser: 2000
    runAsGroup: 2000
    fsGroup: 2000
    fsGroupChangePolicy: OnRootMismatch

service:
  app:
    ports:
      http:
        port: *port

route:
  internal: &route
    annotations:
      gatus.home-operations.com/enabled: "false"
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - "error-pages.atoca.house"
    rules:
      - backendRefs:
          - name: error-pages
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /
  external:
    <<: *route
    annotations:
      externaldns.enable.custom/internal: "false"
    parentRefs:
      - name: atoca-house-external
        namespace: kube-system
