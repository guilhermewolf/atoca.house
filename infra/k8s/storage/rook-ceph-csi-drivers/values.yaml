---
# Admin-managed Ceph-CSI drivers (Rook v1.20+). Replaces the CSI settings that
# previously lived in the rook-ceph operator chart. Values here reproduce the
# live Driver/OperatorConfig CRs to keep CSI behaviour unchanged across upgrade.
operatorConfig:
  driverSpecDefaults:
    clusterName: rook-ceph
    # Chart default maxLogSize "10Gi" breaks the CSI log-rotator: logrotate's
    # size directive only accepts k/M/G, so "Gi" -> "unknown unit 'i'".
    log:
      rotation:
        maxLogSize: "10G"
    # Preserve: live CRs have enableMetadata: true (RBD image metadata).
    # Per-driver fields render null and inherit this default.
    enableMetadata: true
    controllerPlugin:
      # Required: CephCluster uses host networking (network.provider: host),
      # so the CSI provisioner must be on the host network to reach the mons.
      hostNetwork: true
      replicas: 2

drivers:
  rbd:
    enabled: true
    name: rook-ceph.rbd.csi.ceph.com
    snapshotPolicy: volumeSnapshot
    # Chart renders the per-driver Driver CR with its own default maxLogSize
    # "10Gi", which beats operatorConfig.driverSpecDefaults in the operator
    # merge. Must override here too or logrotate fails: "unknown unit 'i'".
    log:
      rotation:
        maxLogSize: "10G"
    controllerPlugin:
      hostNetwork: true
      replicas: 2

  cephfs:
    enabled: true
    name: rook-ceph.cephfs.csi.ceph.com
    snapshotPolicy: volumeGroupSnapshot
    kernelMountOptions:
      ms_mode: prefer-crc
    log:
      rotation:
        maxLogSize: "10G"
    controllerPlugin:
      hostNetwork: true
      replicas: 2

  nfs:
    enabled: false

  nvmeof:
    enabled: false
