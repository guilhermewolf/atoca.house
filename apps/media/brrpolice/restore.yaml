---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: brrpolice-restore
  namespace: brrpolice
spec:
  trigger:
    manual: restore-once
  restic:
    repository: brrpolice-r2-secret
    copyMethod: Direct
    destinationPVC: brrpolice
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
    moverSecurityContext:
      runAsUser: 99
      runAsGroup: 100
      fsGroup: 100
