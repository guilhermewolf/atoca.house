---
controllers:
  app:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/karakeep-app/karakeep
          tag: 0.32.0
        env:
          BROWSER_WEB_URL: http://karakeep-chrome.karakeep.svc.cluster.local:9222
          COREPACK_INTEGRITY_KEYS: "0"
          CRAWLER_DOWNLOAD_BANNER_IMAGE: true
          CRAWLER_ENABLE_ADBLOCKER: true
          CRAWLER_STORE_SCREENSHOT: true
          CRAWLER_FULL_PAGE_SCREENSHOT: true
          DATA_DIR: /data
          # OIDC-only: allow OAuth users to auto-provision, but disable the
          # password signup/login form so OAuth is the only entry point.
          DISABLE_SIGNUPS: false
          DISABLE_PASSWORD_AUTH: true
          MAX_ASSET_SIZE_MB: 50
          MEILI_ADDR: http://karakeep-meilisearch.karakeep.svc.cluster.local:7700
          NEXTAUTH_URL: https://karakeep.atoca.house
          DISABLE_NEW_RELEASE_CHECK: true
          INFERENCE_IMAGE_MODEL: "llava"
          INFERENCE_TEXT_MODEL: "mistral"
          INFERENCE_JOB_TIMEOUT_SEC: 600 # 10 Minutes
          OLLAMA_BASE_URL: "http://ollama.ai.svc.cluster.local:11434"
          OLLAMA_KEEP_ALIVE: 5m
          # OIDC (Authelia)
          OAUTH_WELLKNOWN_URL: https://auth.atoca.house/.well-known/openid-configuration
          OAUTH_CLIENT_ID: karakeep
          OAUTH_PROVIDER_NAME: "Authelia"
          OAUTH_SCOPE: "openid email profile"
          OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: true
        envFrom:
          - secretRef:
              name: karakeep
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 2Gi

  chrome:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: gcr.io/zenika-hub/alpine-chrome
          tag: 124
        command:
          - chromium-browser
        args:
          - --headless
          - --no-sandbox
          - --disable-gpu
          - --disable-dev-shm-usage
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --hide-scrollbars
          - --user-agent "${USER_AGENT}"
        env:
          USER_AGENT: "Mozilla/5.0 (Linux; Android 6.0.1; Nexus 5X Build/MMB29P) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/W.X.Y.Z Mobile Safari/537.36 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"
        securityContext:
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 2Gi

  meilisearch:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: docker.io/getmeili/meilisearch
          tag: v1.47.0
        env:
          MEILI_NO_ANALYTICS: true
          MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE: true
          MEILI_MASTER_KEY:
            valueFrom:
              secretKeyRef:
                name: karakeep
                key: MEILI_MASTER_KEY
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 4Gi

defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: karakeep
          topologyKey: "kubernetes.io/hostname"

service:
  app:
    controller: app
    ports:
      http:
        port: 3000
  chrome:
    controller: chrome
    ports:
      http:
        port: 9222
  meilisearch:
    controller: meilisearch
    ports:
      http:
        port: 7700

route:
  app:
    enabled: true
    kind: HTTPRoute
    annotations:
      gatus.io/enabled: "true"
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - karakeep.atoca.house
    rules:
      - backendRefs:
          - name: karakeep-app
            port: 3000
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 15Gi
    advancedMounts:
      app:
        app:
          - path: /data
            subPath: hoarder
      meilisearch:
        app:
          - path: /meili_data
            subPath: meilisearch
