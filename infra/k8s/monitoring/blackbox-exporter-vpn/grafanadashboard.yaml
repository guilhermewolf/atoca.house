---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-exporter-vpn
spec:
  allowCrossNamespaceImport: true
  # Unique UID: LAN and VPN import the same upstream dashboard (13659), which
  # carries a single uid. Without an override the second import would relocate
  # the first instead of creating a separate dashboard.
  uid: blackbox-exporter-vpn
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/13659/revisions/1/download
