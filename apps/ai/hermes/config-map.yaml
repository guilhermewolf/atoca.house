---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  config.yaml: |
    # Hermes Agent configuration
    # Docs: https://hermes-agent.nousresearch.com/docs
    #
    # Model provider: routed to the in-cluster Ollama (OpenAI-compatible /v1 API).
    # Ollama ignores the api_key, so a literal placeholder is fine here.
    # `default` MUST be the exact tag present in Ollama (`/v1/models`). The agent
    # needs function/tool-calling support — chat-only models won't drive toolsets.
    # Currently pulled tool-capable tags: qwen3:8b-q4_K_M, qwen2.5:7b-instruct-q4_K_M.
    #
    # NOTE: do NOT use `provider: openai-codex` / `gpt-5.5` here — that targets the
    # ChatGPT/Codex *subscription* backend (https://chatgpt.com/backend-api/codex),
    # which needs Codex OAuth creds and is unreachable from the cluster (HTTP 503).
    model:
      default: qwen3:8b-q4_K_M
      provider: custom:ollama
    providers:
      ollama:
        base_url: http://ollama.ollama.svc.cluster.local/v1
        api_key: ollama
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    # Memory: built-in MEMORY.md/USER.md always active; external provider is additive.
    # Holographic = local SQLite (FTS5 + trust scoring + contradiction detection),
    # zero extra infra, no LLM/embeddings/Qdrant, no GPU. DB lives on the /opt/data
    # PVC (covered by Volsync backup). See plugins.hermes-memory-store below.
    memory:
      provider: holographic
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    group_sessions_per_user: false
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    web:
      search_backend: searxng
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
      tool_use_enforcement: auto
    # Holographic memory store (local SQLite on the /opt/data PVC).
    plugins:
      hermes-memory-store:
        db_path: /opt/data/memory_store.db
        auto_extract: true
        default_trust: 0.5
    # No external MCP servers wired. (Self-hosted mem0/openmemory was dropped: its
    # native hermes provider is cloud-only, and the openmemory-mcp image can't pass
    # the api-key/768-dims our authed Qdrant + nomic embedder need.)
