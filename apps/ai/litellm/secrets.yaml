---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: litellm-secret
    template:
      data:
        # App
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        # Free-tier provider keys (litellm reads these from env automatically)
        GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
        CEREBRAS_API_KEY: "{{ .CEREBRAS_API_KEY }}"
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        MISTRAL_API_KEY: "{{ .MISTRAL_API_KEY }}"
  dataFrom:
    - extract:
        key: litellm-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-db-secret
  namespace: litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres-cluster-store
  target:
    name: litellm-db-secret
    template:
      data:
        # LiteLLM uses Prisma -> requires the postgresql:// scheme. Connects to
        # the primary (host) directly, not pgBouncer, since startup migrations
        # need a non-transaction-pooled connection.
        #
        # schema={user}: Crunchy's autoCreateUserSchema gives the role its own
        # schema (named after the user) and the default "$user" search_path makes
        # Prisma create tables there, while the query engine defaults to "public".
        # Pin Prisma to the user schema so migrate + runtime agree (the role owns
        # it and lacks CREATE on public anyway).
        #
        # sslcert pins Prisma to the cert-manager CA (mounted at
        # /etc/ssl/postgres/ca.crt) so the server cert is verified instead of
        # blindly accepted. In Prisma, sslcert = path to the server's CA cert.
        DATABASE_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "host" }}:{{ index . "port" | toString }}/{{ index . "dbname" }}?sslmode=require&sslcert=/etc/ssl/postgres/ca.crt&schema={{ index . "user" }}'
  dataFrom:
    - extract:
        key: postgres-pguser-litellm
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
