controllers:
  qui:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      qui:
        image:
          repository: ghcr.io/autobrr/qui
          tag: v1.21.0@sha256:79c1b800297c985cbeb7fb3215cbb00b32a22cb6a39b7e356eb8bb75d872c924
          pullPolicy: IfNotPresent
        env:
          QUI__HOST: 0.0.0.0
          QUI__PORT: &port 80
          QUI__LOG_LEVEL: INFO
          QUI__METRICS_ENABLED: true
          QUI__METRICS_HOST: 0.0.0.0
          QUI__METRICS_PORT: &metricsPort 8080
        envFrom:
          - secretRef:
              name: "qui-secret"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *port
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 10m
            memory: 192Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 99
    runAsGroup: 100
    fsGroup: 100
    fsGroupChangePolicy: OnRootMismatch

service:
  qui:
    controller: qui
    ports:
      http:
        port: *port
      metrics:
        port: *metricsPort

serviceMonitor:
  app:
    endpoints:
      - port: metrics

route:
  qui:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - qui.atoca.house
    rules:
      - backendRefs:
          - name: qui
            port: 80
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  qui:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    type: nfs
    server: nas.internal
    path: /mnt/user/data/torrents
    globalMounts:
      - path: /data/torrents
