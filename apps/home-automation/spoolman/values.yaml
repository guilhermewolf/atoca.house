---
controllers:
  spoolman:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      spoolman:
        image:
          repository: ghcr.io/donkie/spoolman
          tag: 0.23.1@sha256:c798bcc19194949962044459e4b43c09d667d084ae9c2c2e0187a42c36d43d9e
        command:
          - uvicorn
          - spoolman.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          SPOOLMAN_DB_TYPE: postgres
          SPOOLMAN_METRICS_ENABLED: "true"
        envFrom:
          - secretRef:
              name: spoolman-db-secrets
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

service:
  spoolman:
    controller: spoolman
    type: ClusterIP
    ports:
      http:
        port: &port 8000

route:
  aspoolmanpp:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - spoolman.atoca.house
    rules:
      - backendRefs:
          - name: spoolman
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block
    accessMode: ReadWriteOnce
    size: 3Gi
    globalMounts:
      - path: /home/app/.local/share/spoolman

serviceMonitor:
  spoolman:
    serviceName: spoolman
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 1m
        scrapeTimeout: 10s
        metricRelabelings:
          - action: labeldrop
            regex: (pod)
