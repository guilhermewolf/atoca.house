---
controllers:
  postiz:
    labels:
      postgres: "true"
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/gitroomhq/postiz-app
          tag: v2.21.10@sha256:1d5a5dc6b896747d1483c01dc2562165bd313ad601b32f6cabb7f7dd08a911a9
        env:
          # Combined image: Caddy on 5000 proxies / -> frontend(4200), /api -> backend(3000)
          MAIN_URL: "https://postiz.atoca.house"
          FRONTEND_URL: "https://postiz.atoca.house"
          NEXT_PUBLIC_BACKEND_URL: "https://postiz.atoca.house/api"
          BACKEND_INTERNAL_URL: "http://localhost:3000"
          IS_GENERAL: "true"
          # Crunchy Postgres TLS is signed by the cert-manager postgres-ca,
          # mounted at /etc/ssl/postgres/ca.crt and added to Node's trust store
          # so the pg/Mastra client verifies it (no SELF_SIGNED_CERT_IN_CHAIN).
          NODE_EXTRA_CA_CERTS: /etc/ssl/postgres/ca.crt
          # Temporal workflow engine (required since Postiz v2.12.0)
          TEMPORAL_ADDRESS: "temporal-app.temporal.svc.cluster.local:7233"
          # Local file storage on a ceph-block PVC (backed up to R2 via Volsync)
          STORAGE_PROVIDER: "local"
          UPLOAD_DIRECTORY: "/uploads"
          NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY: "/uploads"
          # Redis (Dragonfly) - DB index 8 (5/6/7 already in use)
          REDIS_URL: "redis://dragonfly.dragonfly-cluster.svc.cluster.local:6379/8"
          # Flip to "true" once your first user is registered
          DISABLE_REGISTRATION: "true"
          API_LIMIT: "30"
          # OIDC login via Authelia (disables GitHub/Google login providers)
          POSTIZ_GENERIC_OAUTH: "true"
          NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: "Authelia"
          POSTIZ_OAUTH_URL: "https://auth.atoca.house"
          POSTIZ_OAUTH_AUTH_URL: "https://auth.atoca.house/api/oidc/authorization"
          POSTIZ_OAUTH_TOKEN_URL: "https://auth.atoca.house/api/oidc/token"
          POSTIZ_OAUTH_USERINFO_URL: "https://auth.atoca.house/api/oidc/userinfo"
        envFrom:
          - secretRef:
              name: postiz-secret
          - secretRef:
              name: postiz-db-secret
        # Combined image runs nginx (master as root, workers drop to the `nginx`
        # user) + pm2; it needs the default Docker capability set (SETUID/SETGID/
        # CHOWN/DAC_OVERRIDE). Dropping ALL caps makes nginx fail to write
        # /var/lib/nginx. This image is not built for cap-hardening.
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            # Combined image runs nginx + 3 Node procs (backend/frontend/
            # orchestrator) and builds the orchestrator at startup -> memory spikes.
            memory: 4Gi

service:
  app:
    ports:
      http:
        port: 5000

route:
  app:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: atoca-house-internal
        namespace: kube-system
    hostnames:
      - postiz.atoca.house
    rules:
      - backendRefs:
          - name: postiz
            port: 5000
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  postgres-ca:
    type: configMap
    name: postgres-ca
    globalMounts:
      - path: /etc/ssl/postgres/ca.crt
        subPath: ca.crt
        readOnly: true
  uploads:
    type: nfs
    server: nas.internal
    path: /mnt/user/media/
    globalMounts:
      - path: /uploads

  config:
    type: emptyDir
    advancedMounts:
      postiz:
        app:
          - path: /config
  tmpfs:
    type: emptyDir
    advancedMounts:
      postiz:
        app:
          - path: /tmp
